<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>他们曾存在 · Echoes of Civilization</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Noto+Serif+SC:wght@300;400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap');
:root{
  --bg:#07050a;--b:rgba(201,168,76,0.12);--b2:rgba(201,168,76,0.06);
  --t:#f5ede0;--m:rgba(245,237,224,0.6);--d:rgba(245,237,224,0.28);
  --gold:#c9a84c;--gold2:rgba(201,168,76,0.35);--gold3:rgba(201,168,76,0.1);
  --a:#c9a84c;--sw:320px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;font-family:'Noto Serif SC','EB Garamond',serif;color:var(--t);user-select:none}
* { cursor:none !important }
#cursor{position:fixed;width:10px;height:10px;border:1.5px solid var(--gold);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .15s,height .15s,background .15s;mix-blend-mode:screen}
#cursor.h{width:24px;height:24px;background:var(--gold3)}
#app{display:flex;width:100%;height:100%}
#ga{flex:1;position:relative;overflow:hidden}
canvas{position:absolute;inset:0}
#cs{z-index:0}#cg{z-index:1;cursor:grab !important}#cg.drag{cursor:grabbing !important}

/* TOP BAR */
#tb{position:absolute;top:0;left:0;right:0;z-index:30;padding:14px 20px;display:flex;align-items:center;gap:12px;background:linear-gradient(to bottom,rgba(7,5,10,.99),transparent);pointer-events:none}
#tb>*{pointer-events:auto}
.logo{font-family:'Cinzel',serif;font-size:15px;font-weight:700;letter-spacing:5px;color:#f5e070;text-shadow:0 0 24px rgba(201,168,76,.8)}
.logo-s{font-size:10px;color:rgba(245,237,224,.5);letter-spacing:2px;margin-top:2px;font-style:italic}
.tbr{margin-left:auto;display:flex;align-items:center;gap:8px}
.ab{height:30px;padding:0 14px;border-radius:3px;border:1px solid var(--b);background:transparent;color:var(--m);font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;cursor:pointer !important;transition:all .2s}
.ab:hover,.ab.on{border-color:var(--gold);color:var(--gold);background:var(--gold3)}

/* SIDEBAR */
#sp{width:var(--sw);background:rgba(7,5,10,.98);border-left:1px solid var(--b);display:flex;flex-direction:column;flex-shrink:0;position:relative;z-index:20}
.sph{padding:16px 16px 12px;border-bottom:1px solid var(--b);flex-shrink:0}
.spt{font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:3px;color:var(--t);margin-bottom:10px;text-transform:uppercase}
.sps{position:relative}
.sps input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.15);border-radius:3px;padding:8px 28px 8px 10px;color:#fff;font-family:'Noto Serif SC',serif;font-size:13px;outline:none;transition:border-color .2s}
.sps input::placeholder{color:rgba(245,237,224,.4);font-size:12px}
.sps input:focus{border-color:var(--gold2)}
.sps .si{position:absolute;right:9px;top:50%;transform:translateY(-50%);color:var(--d);font-size:12px;pointer-events:none}
.spl{flex:1;overflow-y:auto;padding:4px 0;scrollbar-width:thin;scrollbar-color:var(--b2) transparent}
.cr{display:flex;flex-direction:column;padding:9px 14px;cursor:pointer !important;transition:background .12s;border-bottom:1px solid rgba(201,168,76,.04)}
.cr:hover,.cr.active{background:rgba(201,168,76,.06)}
.cr.active .crn{color:var(--gold)}
.cr-top{display:flex;align-items:center;gap:8px;width:100%}
.crf{font-size:18px;flex-shrink:0;width:24px;text-align:center}
.cri{flex:1;min-width:0}
.crn{font-size:14px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'Cinzel',serif}
.crs{font-size:11px;color:rgba(245,237,224,.7);letter-spacing:.3px;margin-top:2px}
.cr-tags{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
.cr-tag{font-size:9px;padding:2px 7px;border:1px solid var(--b);border-radius:10px;color:var(--d);letter-spacing:.5px}

/* ZOOM */
#zw{position:absolute;bottom:56px;left:16px;z-index:30;display:flex;flex-direction:column;gap:4px}
.zb{width:30px;height:30px;border-radius:3px;border:1px solid var(--b);background:rgba(7,5,10,.9);color:var(--m);cursor:pointer !important;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:'Cinzel',serif}
.zb:hover{border-color:var(--gold);color:var(--gold)}

/* BREADCRUMB */
#bc{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:7px;font-size:11px;letter-spacing:1.5px;color:var(--m);background:rgba(7,5,10,.88);border:1px solid var(--b);border-radius:20px;padding:7px 16px;white-space:nowrap;z-index:30;font-family:'Cinzel',serif}
.bci{cursor:pointer !important;transition:color .15s}.bci:hover,.bci.a{color:var(--gold)}.bcs{opacity:.25}

/* TOOLTIP */
#tip{position:fixed;z-index:50;pointer-events:none;background:rgba(7,5,10,.97);border:1px solid var(--gold2);border-radius:4px;padding:0;opacity:0;transition:opacity .1s;overflow:hidden;max-width:220px}
.tip-img{width:220px;height:120px;object-fit:cover;display:block;filter:brightness(.75) sepia(.15)}
.tip-body{padding:8px 12px}
.tip-name{font-family:'Cinzel',serif;font-size:12px;color:var(--t);margin-bottom:2px}
.tip-sub{font-size:10px;color:var(--d);font-style:italic}

/* ═══ COUNTRY VIEW ═══ */
#cv{position:absolute;inset:0;z-index:25;display:none;flex-direction:column;background:rgba(7,5,10,.99);overflow:hidden}
#cv.open{display:flex}
.cvh{padding:12px 18px;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:12px;flex-shrink:0;background:rgba(7,5,10,1)}
.cvbk{height:32px;padding:0 16px;border-radius:3px;border:1px solid rgba(255,255,255,.3);background:transparent;color:#fff;cursor:pointer !important;font-size:12px;display:flex;align-items:center;gap:5px;transition:all .2s;flex-shrink:0;font-family:'Cinzel',serif;letter-spacing:1px}
.cvbk:hover{border-color:var(--gold);color:var(--gold)}
.cvflag{font-size:22px}
.cvn{font-family:'Cinzel',serif;font-size:20px;font-weight:700;color:#fff;text-shadow:0 0 20px rgba(201,168,76,.3)}
.cvsub{font-size:13px;color:rgba(245,237,224,.75);letter-spacing:1px;margin-top:3px;font-style:italic}
.cvmode{margin-left:auto;display:flex;gap:6px;align-items:center}
.mvbtn{height:28px;padding:0 12px;border-radius:3px;border:1px solid var(--b);background:transparent;color:var(--d);font-size:10px;font-weight:600;cursor:pointer !important;transition:all .2s;letter-spacing:1px;font-family:'Cinzel',serif}
.mvbtn.active{border-color:var(--gold);color:var(--gold);background:var(--gold3)}
.lang-toggle{height:28px;padding:0 12px;border-radius:3px;border:1px solid var(--b);background:transparent;color:var(--d);font-size:10px;cursor:pointer !important;transition:all .2s;font-family:'Cinzel',serif;letter-spacing:1px}
.lang-toggle:hover{border-color:var(--gold);color:var(--gold)}

/* ═══ COUNTRY EXPLORE AREA ═══ */
#cv-explore{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0;height:0;}

/* ── TIMELINE FULL VIEW (DOM) ── */
#cv-tl-view{flex:1;overflow:hidden;min-height:0;width:100%;position:relative;background:radial-gradient(ellipse at 50% 50%,rgba(20,10,5,1) 0%,rgba(3,2,8,1) 100%);}

/* Stars background via pseudo */
#cv-tl-view::before{content:'';position:absolute;inset:0;background-image:radial-gradient(1px 1px at 10% 20%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 30% 60%,rgba(255,255,255,.3) 0%,transparent 100%),radial-gradient(1px 1px at 50% 15%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(1px 1px at 70% 80%,rgba(255,255,255,.3) 0%,transparent 100%),radial-gradient(1px 1px at 85% 35%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 20% 85%,rgba(255,255,255,.3) 0%,transparent 100%),radial-gradient(1px 1px at 60% 45%,rgba(255,255,255,.2) 0%,transparent 100%),radial-gradient(1px 1px at 90% 10%,rgba(255,255,255,.35) 0%,transparent 100%);pointer-events:none;z-index:0;}

/* DOM timeline container */
#tl-dom{position:absolute;inset:0;z-index:1;}

/* Spine line */
#tl-spine{position:absolute;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,rgba(255,255,255,.5) 5%,rgba(255,255,255,.5) 95%,transparent);top:50%;transform:translateY(-50%);z-index:1;}

/* Year tick labels */
.tl-tick{position:absolute;top:50%;transform:translateX(-50%);text-align:center;pointer-events:none;z-index:2;}
.tl-tick-line{width:1px;height:8px;background:rgba(255,255,255,.3);margin:0 auto 4px;}
.tl-tick-label{font-family:'Cinzel',serif;font-size:11px;color:rgba(255,255,255,.6);font-weight:700;white-space:nowrap;}

/* Zero marker */
#tl-zero{position:absolute;top:0;bottom:0;width:2px;background:rgba(255,220,80,.5);z-index:1;transform:translateX(-50%);}
#tl-zero-label{position:absolute;top:50%;transform:translate(-50%,8px);font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:rgba(255,220,80,.9);}

/* NOW marker */
#tl-now{position:absolute;top:0;bottom:0;width:1px;background:rgba(100,220,255,.4);z-index:1;transform:translateX(-50%);}
#tl-now-label{position:absolute;top:16px;transform:translateX(-50%);font-family:'Cinzel',serif;font-size:10px;color:rgba(100,220,255,.8);font-weight:700;}

/* Era NODE BUTTONS — these are real DOM buttons, always clickable */
.tl-node{
  position:absolute;transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;
  cursor:pointer !important;z-index:10;
  background:none;border:none;padding:0;
  transition:transform .15s;
}
.tl-node:hover{transform:translate(-50%,-50%) scale(1.12);}
.tl-node:hover .tl-node-dot{background:#fff;box-shadow:0 0 20px rgba(255,255,255,.7),0 0 40px rgba(255,255,255,.3);}
.tl-node:hover .tl-node-label{color:#fff;}
.tl-node:hover .tl-node-name{color:rgba(255,220,100,1);}

.tl-node-above{flex-direction:column-reverse;}

/* Dot */
.tl-node-dot{
  width:14px;height:14px;border-radius:50%;
  background:rgba(255,200,80,.85);
  box-shadow:0 0 12px rgba(255,200,80,.5);
  border:2px solid rgba(255,255,255,.4);
  flex-shrink:0;
}
/* Stem */
.tl-node-stem{width:1.5px;height:44px;background:linear-gradient(to bottom,rgba(255,255,255,.5),rgba(255,255,255,.1));flex-shrink:0;}
.tl-node-above .tl-node-stem{background:linear-gradient(to top,rgba(255,255,255,.5),rgba(255,255,255,.1));}

/* Labels */
.tl-node-labels{text-align:center;padding:4px 0;}
.tl-node-label{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:rgba(255,255,255,.95);white-space:nowrap;text-shadow:0 1px 6px rgba(0,0,0,.9);}
.tl-node-name{font-family:'Noto Serif SC',serif;font-size:12px;color:rgba(255,210,80,.85);white-space:nowrap;margin-top:2px;text-shadow:0 1px 4px rgba(0,0,0,.9);}
.tl-node-count{font-family:'Cinzel',serif;font-size:9px;color:rgba(255,255,255,.5);margin-top:2px;}

/* Popup card (hover) */
#tl-popup{
  position:absolute;z-index:20;pointer-events:none;
  background:rgba(5,3,10,.97);border:1px solid rgba(255,255,255,.25);
  border-radius:6px;padding:16px 20px;min-width:260px;max-width:340px;
  box-shadow:0 8px 32px rgba(0,0,0,.8);
  transition:opacity .15s;
}
#tl-popup-epoch{font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;color:#f0c84a;margin-bottom:5px;font-weight:700;text-transform:uppercase;}
#tl-popup-title{font-family:'Cinzel',serif;font-size:17px;font-weight:700;color:#fff;margin-bottom:10px;}
.tl-popup-row{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:rgba(255,255,255,.88);margin-bottom:6px;line-height:1.5;}
.tl-popup-row strong{color:#f0c84a;}

/* Bottom hint */
#tl-hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-family:'Cinzel',serif;font-size:11px;color:rgba(255,255,255,.35);white-space:nowrap;pointer-events:none;z-index:2;letter-spacing:1px;}

/* ── NEBULA VIEW ── */
#cv-nebula-view{
  position:absolute;inset:0;z-index:10;
  display:none;flex-direction:column;
  background:#03020a;overflow:hidden;
}
#cv-nebula-view.open{display:flex}
#nebula-header{
  flex-shrink:0;
  padding:14px 20px 10px;
  display:flex;flex-direction:column;gap:10px;
  background:rgba(3,2,10,.92);
  border-bottom:1px solid rgba(255,255,255,.08);
  pointer-events:auto;z-index:5;
}
.nebula-header-row1{display:flex;align-items:center;gap:12px;}
.nebula-header-row2{display:flex;align-items:center;gap:8px;}
#nebula-back-btn{
  height:36px;padding:0 18px;border-radius:4px;
  border:1.5px solid rgba(255,255,255,.6);background:rgba(10,6,20,.85);
  color:#fff;font-family:'Cinzel',serif;
  font-size:12px;letter-spacing:1px;cursor:pointer !important;transition:all .2s;
  font-weight:700;
}
#nebula-back-btn:hover{border-color:var(--gold);color:var(--gold)}
#nebula-era-badge{
  font-family:'Cinzel',serif;font-size:14px;font-weight:700;letter-spacing:2px;
  color:#fff;padding:6px 18px;border-radius:20px;
  border:1px solid rgba(201,168,76,.5);background:rgba(3,2,10,.6);
}
#nebula-hint{margin-left:auto;font-size:11px;color:rgba(255,255,255,.45);font-style:italic;letter-spacing:.5px;}

/* ── NEBULA FILTER BAR ── */
#nebula-filter{
  position:absolute;bottom:0;left:0;right:0;z-index:6;
  padding:10px 18px;display:flex;align-items:center;gap:8px;
  background:linear-gradient(to top,rgba(3,2,10,.95),transparent);
  pointer-events:none;
}
#nebula-filter>*{pointer-events:auto}
.nf-label{font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;color:rgba(245,237,224,.5);margin-right:4px}
.nf-btn{
  height:30px;padding:0 14px;border-radius:15px;
  border:1px solid rgba(255,255,255,.25);background:rgba(3,2,10,.7);
  color:rgba(255,255,255,.7);font-family:'Cinzel',serif;
  font-size:11px;letter-spacing:.5px;cursor:pointer !important;transition:all .2s;
}
.nf-btn:hover{border-color:rgba(255,255,255,.6);color:#fff;background:rgba(255,255,255,.1)}
.nf-btn.active{border-color:#f0c84a;color:#f0c84a;background:rgba(201,168,76,.15);font-weight:700}

#nebula-body{flex:1;display:flex;min-height:0;}
#nebula-canvas{flex:1;display:block;cursor:grab;min-height:0;}
#nebula-canvas.panning{cursor:grabbing}
#nebula-info{
  width:230px;flex-shrink:0;border-left:1px solid rgba(255,255,255,.1);
  background:rgba(3,2,10,.8);padding:20px 16px;
  display:flex;flex-direction:column;gap:10px;
  overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent;
}
#nebula-info-era{font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;color:#f0c84a;text-transform:uppercase;font-weight:700;}
#nebula-info-label{font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:#fff;line-height:1.3;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.1);}
#nebula-info-events{display:flex;flex-direction:column;gap:8px;}
.ni-event{padding:8px 10px;border-radius:4px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);}
.ni-event-year{font-family:'Cinzel',serif;font-size:10px;color:#f0c84a;font-weight:700;margin-bottom:3px;}
.ni-event-text{font-size:12px;color:rgba(255,255,255,.85);line-height:1.5;}
#nebula-info-hint{font-size:11px;color:rgba(255,255,255,.3);text-align:center;line-height:1.6;margin-top:auto;padding-top:12px;border-top:1px solid rgba(255,255,255,.07);font-style:italic;}

/* ═══ ITEM DETAIL SIDE CARD ═══ */
#gcard{position:absolute;top:0;right:0;width:340px;height:100%;background:rgba(5,3,14,.98);border-left:1px solid rgba(255,255,255,.12);z-index:50;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.22,1,.36,1);pointer-events:none;backdrop-filter:blur(8px);}
#gcard.open{transform:translateX(0);pointer-events:auto}
.gc-close{position:absolute;top:10px;right:10px;width:36px;height:36px;border-radius:4px;
  border:1px solid rgba(255,80,80,.5);background:rgba(200,40,40,.15);color:rgba(255,120,120,.9);
  cursor:pointer !important;font-size:18px;font-weight:700;
  display:flex;align-items:center;justify-content:center;transition:all .2s;}
.gc-close:hover{border-color:rgba(255,80,80,.9);background:rgba(200,40,40,.35);color:#fff;}
.gc-header{padding:20px 18px 14px;border-bottom:1px solid var(--b)}
.gc-img{width:100%;height:160px;object-fit:cover;display:block;filter:brightness(.7) sepia(.2)}
.gc-img-fb{width:100%;height:160px;display:flex;align-items:center;justify-content:center;font-size:56px;background:linear-gradient(135deg,#0f0a04,#1e1508)}
.gc-cat{font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;color:var(--gold);margin-bottom:6px;text-transform:uppercase}
.gc-name{font-family:'Cinzel',serif;font-size:20px;font-weight:700;color:#fff;line-height:1.2;margin-bottom:4px;text-shadow:0 0 20px rgba(201,168,76,.2)}
.gc-name-en{font-family:'Cinzel',serif;font-size:10px;color:var(--d);letter-spacing:2px;margin-bottom:6px;font-style:italic}
.gc-era{display:inline-block;padding:3px 12px;border:1px solid var(--gold2);border-radius:20px;font-size:9px;color:var(--gold);font-family:'Cinzel',serif;letter-spacing:1px;margin-bottom:14px}
.gc-body{flex:1;overflow-y:auto;padding:0 18px 80px;scrollbar-width:thin;scrollbar-color:var(--b2) transparent}
.gc-sec{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--d);margin:14px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--b);font-weight:700}
.gc-bio{font-size:13px;line-height:1.9;color:rgba(255,255,255,.85)}
.gc-facts{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.gc-fact{background:rgba(255,255,255,.03);border:1px solid var(--b);border-radius:3px;padding:8px 10px}
.gc-fk{font-size:10px;letter-spacing:1px;color:rgba(201,168,76,.8);margin-bottom:3px;font-family:'Cinzel',serif}
.gc-fv{font-size:12px;color:#fff;line-height:1.4}
.gc-links{display:flex;flex-direction:column;gap:6px}
.gc-link{display:flex;align-items:center;justify-content:center;gap:7px;padding:9px 12px;border-radius:3px;border:1px solid;font-size:11px;font-weight:600;letter-spacing:.4px;cursor:pointer !important;text-decoration:none;transition:all .2s;font-family:'Cinzel',serif}
.gl-b{background:rgba(66,133,244,.05);border-color:rgba(66,133,244,.3);color:#5a9ef8}
.gl-b:hover{background:rgba(66,133,244,.12)}
.gl-w{background:rgba(180,180,255,.05);border-color:rgba(180,180,255,.25);color:#c4b5fd}
.gl-w:hover{background:rgba(180,180,255,.12)}
.gl-o{background:var(--gold3);border-color:var(--gold2);color:var(--gold)}
.gl-o:hover{background:rgba(201,168,76,.18)}
/* Relationships */
.gc-rel{display:flex;align-items:center;gap:7px;font-size:11px;padding:6px 8px;border-radius:3px;background:rgba(255,255,255,.03);border:1px solid var(--b);margin-bottom:4px;cursor:pointer !important;transition:all .15s}
.gc-rel:hover{border-color:var(--gold2);background:var(--gold3)}
.gc-rel-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.gc-rel-name{color:var(--t);font-weight:600;flex:1;font-family:'Cinzel',serif;font-size:10px}
.gc-rel-type{font-size:9px;letter-spacing:.5px;text-transform:uppercase;font-weight:700;color:var(--d)}

/* Grain overlay */
body::before{content:'';position:fixed;inset:0;z-index:1;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");background-size:200px 200px;opacity:.5}

::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

 </div>

let zoom=1,rotX=0.3,rotY=0,isDrag=false,dragS={x:0,y:0},rotS={x:0,y:0};
let autoRot=true,hovered=null,currentCountry=null,langCur='zh';

const stC=document.getElementById('cs'),stX=stC.getContext('2d');
const glC=document.getElementById('cg'),glX=glC.getContext('2d');
let stars=[],W,H;

function resize(){
  W=window.innerWidth-parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sw'));

function genStars(){
  stars=[];
  for(let i=0;i<280;i++) stars.push({x:Math.random()*window.innerWidth,y:Math.random()*H,r:Math.random()*1.1+0.2,a:Math.random()*.6+.1});
}
function drawStars(){

  stars.forEach(s=>{stX.beginPath();stX.arc(s.x,s.y,s.r,0,Math.PI*2);stX.fillStyle=`rgba(245,237,224,${s.a})`;stX.fill()});
}

function ll2xyz(la,lo){
  const p=(90-la)*Math.PI/180,t=(lo+180)*Math.PI/180;
  return{x:-Math.sin(p)*Math.cos(t),y:Math.cos(p),z:Math.sin(p)*Math.sin(t)};
}
function rot(p){
  let x1=p.x*Math.cos(rotY)+p.z*Math.sin(rotY),z1=-p.x*Math.sin(rotY)+p.z*Math.cos(rotY);
  let y2=p.y*Math.cos(rotX)-z1*Math.sin(rotX),z2=p.y*Math.sin(rotX)+z1*Math.cos(rotX);
  return{x:x1,y:y2,z:z2};
}

// Floating image bubbles
const imgBubbleCache={};
function getImg(url,id){
  if(imgBubbleCache[id]) return imgBubbleCache[id];
  const img=new Image();
  img.crossOrigin='anonymous';
  img.src=url;
  img.onload=()=>{imgBubbleCache[id]=img};
  imgBubbleCache[id]=img;
  return img;
}

function drawGlobe(){
  const cx=W/2,cy=H/2,R=Math.min(W,H)*.32*zoom;
  glX.clearRect(0,0,window.innerWidth,H);
  // Globe bg
  const g=glX.createRadialGradient(cx-R*.3,cy-R*.3,R*.05,cx,cy,R);
  g.addColorStop(0,'rgba(28,18,8,.95)');g.addColorStop(.7,'rgba(12,8,4,.97)');g.addColorStop(1,'rgba(4,3,2,.99)');
  glX.beginPath();glX.arc(cx,cy,R,0,Math.PI*2);glX.fillStyle=g;glX.fill();
  const eg=glX.createRadialGradient(cx,cy,R*.85,cx,cy,R);
  eg.addColorStop(0,'rgba(255,255,255,0)');eg.addColorStop(1,'rgba(255,255,255,.08)');
  glX.beginPath();glX.arc(cx,cy,R,0,Math.PI*2);glX.fillStyle=eg;glX.fill();
  // Grid
  glX.strokeStyle='rgba(255,255,255,.06)';glX.lineWidth=.5;
  for(let la=-60;la<=60;la+=30){
    const ph=(90-la)*Math.PI/180,y0=Math.cos(ph),rc=Math.sin(ph);
    glX.beginPath();let f=true;
    for(let lo=0;lo<=360;lo+=3){
      const p=rot({x:-rc*Math.cos(lo*Math.PI/180),y:y0,z:rc*Math.sin(lo*Math.PI/180)});
      if(p.z<0){f=true;continue}
      const sx=cx+p.x*R,sy=cy-p.y*R;
      f?glX.moveTo(sx,sy):glX.lineTo(sx,sy);f=false;
    }glX.stroke();
  }
  for(let lo=0;lo<360;lo+=30){
    glX.beginPath();let f=true;
    for(let la=-80;la<=80;la+=3){
      const p=rot(ll2xyz(la,lo));
      if(p.z<0){f=true;continue}
      const sx=cx+p.x*R,sy=cy-p.y*R;
      f?glX.moveTo(sx,sy):glX.lineTo(sx,sy);f=false;
    }glX.stroke();
  }
  // Countries — flag bubbles + glow dots + labels
  COUNTRIES.forEach(c=>{
    const p=rot(ll2xyz(c.lat,c.lon));
    if(p.z<-.12) return;
    const sx=cx+p.x*R, sy=cy-p.y*R;
    const alpha=Math.min(1,(p.z+.3)/1.3);
    const isH=hovered&&hovered.id===c.id;
    const bR=isH?38:28;
    const bubY=sy-bR-10;

    if(p.z>.05){
      // ── photo bubble (try image, fall back to solid) ──
      const img=getImg(c.tooltipImg,c.id);
      glX.save();
      glX.globalAlpha=Math.min(1,alpha*(isH?1:.85));
      glX.beginPath();glX.arc(sx,bubY,bR,0,Math.PI*2);glX.clip();
      if(img.complete&&img.naturalWidth>0){
        glX.drawImage(img,sx-bR,bubY-bR,bR*2,bR*2);
        // darken overlay so flag reads clearly
        glX.fillStyle='rgba(0,0,0,.3)';glX.fillRect(sx-bR,bubY-bR,bR*2,bR*2);
      } else {
        // solid country-color background
        const h=c.color?c.color.h:40;
        glX.fillStyle=`hsl(${h},55%,18%)`;glX.fill();
      }
      glX.restore();

      // ── flag emoji centred in bubble ──
      glX.save();
      glX.globalAlpha=Math.min(1,alpha*(isH?1:.9));
      glX.font=`${isH?22:16}px serif`;
      glX.textAlign='center';glX.textBaseline='middle';
      glX.fillText(c.flag,sx,bubY);
      glX.textBaseline='alphabetic';
      glX.restore();

      // ── ring ──
      glX.beginPath();glX.arc(sx,bubY,bR,0,Math.PI*2);
      glX.strokeStyle=isH?`rgba(255,255,255,${alpha})`:`rgba(255,255,255,${alpha*.5})`;
      glX.lineWidth=isH?2.5:1.2;glX.stroke();

      // ── hover pulse ring ──
      if(isH){
        glX.beginPath();glX.arc(sx,bubY,bR+7,0,Math.PI*2);
        glX.strokeStyle=`rgba(255,255,255,${alpha*.25})`;glX.lineWidth=1;glX.stroke();
      }

      // ── connector stem ──
      glX.strokeStyle=isH?`rgba(255,255,255,${alpha*.6})`:`rgba(255,255,255,${alpha*.2})`;
      glX.lineWidth=isH?1.5:.8;
      glX.beginPath();glX.moveTo(sx,bubY+bR);glX.lineTo(sx,sy-5);glX.stroke();
    }

    // ── glow dot on spine ──
    if(isH){
      const gw=glX.createRadialGradient(sx,sy,0,sx,sy,26);
      gw.addColorStop(0,`rgba(255,255,255,${.4*alpha})`);gw.addColorStop(1,'rgba(255,255,255,0)');
      glX.beginPath();glX.arc(sx,sy,26,0,Math.PI*2);glX.fillStyle=gw;glX.fill();
    }
    glX.beginPath();glX.arc(sx,sy,isH?8:4.5,0,Math.PI*2);
    glX.fillStyle=isH?'#ffffff':`rgba(255,255,255,${alpha*.7})`;glX.fill();

    // ── country name ──
    if(p.z>.1||isH){
      glX.save();
      glX.globalAlpha=Math.min(1,alpha*(isH?1:.75));
      // background pill for legibility
      const name=langCur==='zh'?c.zh:c.en;
      glX.font=isH?`bold 14px 'Noto Serif SC',serif`:`12px 'Noto Serif SC',serif`;
      const tw=glX.measureText(name).width;
      const ty=sy+16;
      if(isH){
        glX.fillStyle='rgba(0,0,0,.65)';
        const pw=tw+14,ph=18,pr=5;
        const px=sx-pw/2,py=ty-14;
        glX.beginPath();
        glX.moveTo(px+pr,py);glX.lineTo(px+pw-pr,py);glX.quadraticCurveTo(px+pw,py,px+pw,py+pr);
        glX.lineTo(px+pw,py+ph-pr);glX.quadraticCurveTo(px+pw,py+ph,px+pw-pr,py+ph);
        glX.lineTo(px+pr,py+ph);glX.quadraticCurveTo(px,py+ph,px,py+ph-pr);
        glX.lineTo(px,py+pr);glX.quadraticCurveTo(px,py,px+pr,py);
        glX.closePath();glX.fill();
      }
      glX.fillStyle=isH?'#fff':`rgba(255,255,255,${alpha*.9})`;
      glX.textAlign='center';
      glX.fillText(name,sx,ty);
      glX.restore();
    }
  });
}

function animate(){
  requestAnimationFrame(animate);
  if(autoRot&&!isDrag) rotY+=.003;
  drawGlobe();
}

function getR(){return Math.min(W,H)*.32*zoom}
function findAt(mx,my){
  const cx=W/2,cy=H/2,R=getR();
  let best=null,bestZ=-99;
  COUNTRIES.forEach(c=>{
    const p=rot(ll2xyz(c.lat,c.lon));if(p.z<-.05)return;
    const sx=cx+p.x*R,sy=cy-p.y*R;
    if(Math.hypot(mx-sx,my-(sy-28))<32&&p.z>bestZ){bestZ=p.z;best=c}
  });
  return best;
}

  const c=findAt(e.clientX,e.clientY);
  if(c!==hovered){hovered=c;c?showTip(c,e.clientX,e.clientY):hideTip();}

});

// TIMELINE — pure DOM (no canvas, guaranteed clicks)
// ══════════════════════════════════════════════

function parseYear(s){
  const m = s.match(/(前)?(\d+)/);
  return m ? (m[1] ? -parseInt(m[2]) : parseInt(m[2])) : 0;
}

function initTimeline(c){
  const container = document.getElementById('tl-dom');
  if(!container) return;
  container.innerHTML = '';

  const tl = [...c.timeline].sort((a,b)=>parseYear(a.era)-parseYear(b.era));
  const years = tl.map(e=>parseYear(e.era));
  const firstYear = Math.min(...years);
  const lastYear  = Math.max(...years);
  const nowYear   = new Date().getFullYear();

  // Range with breathing room
  const roundTo = Math.abs(firstYear)>2000?500:Math.abs(firstYear)>500?100:50;
  let minY = Math.floor((firstYear - Math.max(200, Math.abs(firstYear)*.1)) / roundTo) * roundTo;
  let maxY = Math.max(lastYear + 100, nowYear + 50);
  const span = maxY - minY || 1;

  // Layout percentages
  function pct(y){ return ((y - minY) / span * 100).toFixed(3) + '%'; }

  // ── Spine ──
  const spine = document.createElement('div');
  spine.id = 'tl-spine';
  container.appendChild(spine);

  // ── Hint ──
  const hint = document.createElement('div');
  hint.id = 'tl-hint';
  hint.textContent = langCur==='zh'
    ? '◀  悬停预览  ·  点击节点进入时代  ▶'
    : '◀  HOVER TO PREVIEW  ·  CLICK A NODE TO ENTER  ▶';
  container.appendChild(hint);

  // ── Zero line (if spans BC/AD) ──
  if(minY < 0 && maxY > 0){
    const zl = document.createElement('div');
    zl.id = 'tl-zero';
    zl.style.left = pct(0);
    const zlab = document.createElement('div');
    zlab.id = 'tl-zero-label';
    zlab.style.left = pct(0);
    zlab.textContent = '0';
    container.appendChild(zl);
    container.appendChild(zlab);
  }

  // ── NOW line ──
  const nowl = document.createElement('div');
  nowl.id = 'tl-now';
  nowl.style.left = pct(nowYear);
  const nowlab = document.createElement('div');
  nowlab.id = 'tl-now-label';
  nowlab.style.left = pct(nowYear);
  nowlab.textContent = 'NOW';
  container.appendChild(nowl);
  container.appendChild(nowlab);

  // ── Tick marks ──
  const step = span>3000?500:span>800?200:span>200?50:25;
  const tickStart = Math.ceil(minY/step)*step;
  for(let y=tickStart; y<=maxY; y+=step){
    if(Math.abs(y)<step*0.1) continue; // skip near-zero
    const tick = document.createElement('div');
    tick.className = 'tl-tick';
    tick.style.left = pct(y);
    tick.style.top  = '50%';
    tick.innerHTML = `<div class="tl-tick-line"></div><div class="tl-tick-label">${y<0?-y:y}</div>`;
    container.appendChild(tick);
  }

  // ── Era NODE BUTTONS ──
  tl.forEach((era, i)=>{
    const y  = parseYear(era.era);
    const above = i%2===0;   // alternate above/below spine
    const items = (era.items||[]).map(id=>c.items.find(x=>x.id===id)).filter(Boolean);
    const evts  = era.events||[];

    const btn = document.createElement('button');
    btn.className = 'tl-node' + (above?' tl-node-above':'');
    btn.style.left = pct(y);
    btn.style.top  = '50%';
    btn.setAttribute('aria-label', era.label);

    const dot   = document.createElement('div'); dot.className='tl-node-dot';
    const stem  = document.createElement('div'); stem.className='tl-node-stem';
    const labs  = document.createElement('div'); labs.className='tl-node-labels';

    const yearNum = y<0 ? String(-y) : String(y);
    labs.innerHTML = `
      <div class="tl-node-label">${yearNum}</div>
      <div class="tl-node-name">${langCur==='zh'?era.label:(ERA_LABEL_EN[era.label]||era.label)}</div>
      <div class="tl-node-count">${evts.length||items.length} ✦</div>`;

    if(above){ btn.appendChild(labs); btn.appendChild(stem); btn.appendChild(dot); }
    else      { btn.appendChild(dot);  btn.appendChild(stem); btn.appendChild(labs); }

    // HOVER — show popup
    btn.addEventListener('mouseenter', e=>{
      showTlPopup(era, items, evts, btn, container);
    });
    btn.addEventListener('mouseleave', ()=>{
      hideTlPopup();
    });

    // CLICK — enter nebula immediately
    btn.addEventListener('click', e=>{
      e.stopPropagation();
      enterNebula(c, era);
    });

    container.appendChild(btn);
  });
}

// ── Popup helpers ──
let popupTimer=null;
function showTlPopup(era, items, evts, btn, container){
  clearTimeout(popupTimer);
  const pop = document.getElementById('tl-popup');
  if(!pop) return;
  const _tpe=document.getElementById('tl-popup-epoch');if(_tpe)_tpe.textContent=era.era;
  const _tpt=document.getElementById('tl-popup-title');if(_tpt)_tpt.textContent=langCur==='zh'?era.label:(ERA_LABEL_EN[era.label]||era.label);
  // In EN: use items (have .en). In ZH: prefer events. Fall back gracefully.
  const rows = (langCur==='zh'&&evts.length)
    ? evts
    : items.length
      ? items.map(it=>({y:it.era, e:langCur==='zh'?it.zh:it.en}))
      : evts;
  document.getElementById('tl-popup-rows').innerHTML = rows.map(r=>
    `<div class="tl-popup-row"><strong>${r.y||''}</strong>${r.y?' &nbsp;':''}${r.e||''}</div>`
  ).join('');

  // Position popup: above or below the button
  const cRect  = container.getBoundingClientRect();
  const bRect  = btn.getBoundingClientRect();
  let left = bRect.left - cRect.left + bRect.width/2 - 140;
  left = Math.max(8, Math.min(left, cRect.width-348));
  const isAbove = btn.classList.contains('tl-node-above');
  const top = isAbove
    ? bRect.bottom - cRect.top + 12
    : bRect.top - cRect.top - 8;  // we'll flip via transform below

  pop.style.left = left + 'px';
  if(isAbove){
    pop.style.top = top + 'px';
    pop.style.bottom = 'auto';
    pop.style.transform = '';
  } else {
    pop.style.bottom = (cRect.height - (bRect.top - cRect.top) + 12) + 'px';
    pop.style.top = 'auto';
    pop.style.transform = '';
  }
  pop.style.display = 'block';
}

function hideTlPopup(){
  popupTimer = setTimeout(()=>{
    const pop = document.getElementById('tl-popup');
    if(pop) pop.style.display='none';
  }, 120);
}

function setNebulaFilter(cat){
  nebulaFilter=cat;
  try{
    document.querySelectorAll('.nf-btn').forEach(b=>{
      b.classList.toggle('active', b.dataset.cat===cat);
      if(b.dataset.cat==='all') b.textContent=langCur==='zh'?'全部':'All';
      else if(b.dataset.cat==='遗迹') b.textContent=(langCur==='zh'?'🏛 遗迹':'🏛 Sites');
      else if(b.dataset.cat==='历史人物') b.textContent=(langCur==='zh'?'👤 人物':'👤 Figures');
      else if(b.dataset.cat==='文物') b.textContent=(langCur==='zh'?'🏺 文物':'🏺 Artifacts');
      else if(b.dataset.cat==='博物馆') b.textContent=(langCur==='zh'?'🏛 博物馆':'🏛 Museums');
    });
  }catch(ex){}
}

// ══════════════════════════════════════════════
// NEBULA — starfield canvas  
// ══════════════════════════════════════════════
function enterNebula(c, era){
  document.getElementById('cv-nebula-view').classList.add('open');
  try{const _neb=document.getElementById('nebula-era-badge');if(_neb)_neb.textContent=`${era.era}  ·  ${era.label}`;}catch(ex){}
  try{const _nbt=document.getElementById('nebula-back-btn');if(_nbt)_nbt.textContent=langCur==='zh'?'← 返回时间轴':'← Back to Timeline';}catch(ex){}
  const _nht=document.getElementById('nebula-hint');if(_nht)_nht.textContent=langCur==='zh'?'拖拽漫游 · 点击探索':'Drag to roam · click to explore';

  const canvas=document.getElementById('nebula-canvas');
  const view=document.getElementById('cv-nebula-view');
  // Size canvas: nebula-body width minus info panel (230px), height minus header (52px)
  const nR=view.getBoundingClientRect();
  const totalW=(nR.width||view.offsetWidth||(window.innerWidth-320));
  const totalH=(nR.height||view.offsetHeight||(window.innerHeight-56));
  canvas.width=Math.max(200,totalW-230);
  canvas.height=Math.max(200,totalH-52);
  nebulaOff={x:0,y:0}; nebulaHover=-1;

  // collect items for this era + related items (ghost nodes)
  const eraItems=era.items.map(id=>c.items.find(x=>x.id===id)).filter(Boolean);
  const extraSet=new Set();
  eraItems.forEach(it=>(it.rels||[]).filter(Boolean).forEach(r=>{
    if(r&&r.id&&!eraItems.find(x=>x.id===r.id)) extraSet.add(r.id);
  }));
  const ghostItems=[];
  extraSet.forEach(id=>{
    const found=c.items.find(x=>x&&x.id===id)||COUNTRIES.flatMap(cc=>(cc.items||[])).filter(Boolean).find(x=>x.id===id);
    if(found) ghostItems.push(found);
  });
  const allItems=[...eraItems,...ghostItems].filter(Boolean);

  // layout — golden angle spiral for organic feel
  const W=canvas.width, H=canvas.height, cx=W/2, cy=H/2;
  const golden=2.399963; // golden angle radians
  nebulaNodes=allItems.map((item,i)=>{
    const ghost=i>=eraItems.length;
    const r=ghost?Math.sqrt(i)*55+160:Math.sqrt(i+1)*52+40;
    const a=i*golden+(Math.random()-.5)*.3;
    const jx=(Math.random()-.5)*30, jy=(Math.random()-.5)*30;
    return{
      item, ghost,
      x:cx+Math.cos(a)*r+jx, y:cy+Math.sin(a)*r+jy,
      r:ghost?18:(item&&item.cat==='历史人物')?28:24,
      img:null,imgOk:false
    };
  });

  // edges
  nebulaEdges=[];
  eraItems.forEach(item=>{
    (item.rels||[]).forEach(rel=>{
      const si=nebulaNodes.findIndex(n=>n&&n.item&&n.item.id===item.id);
      const ti=nebulaNodes.findIndex(n=>n&&n.item&&n.item.id===rel.id);
      if(si>=0&&ti>=0) nebulaEdges.push({a:si,b:ti,label:rel.type});
    });
  });

  // image preload
  nebulaNodes.forEach(n=>{
    if(!n||!n.item) return;
    const img=new Image();img.crossOrigin='anonymous';img.src=n.item.img||'';
    img.onload=()=>{n.img=img;n.imgOk=true};
  });

  // generate background stars once
  nebStars=Array.from({length:240},(_,i)=>({
    x:Math.random()*W,y:Math.random()*H,
    r:Math.random()*.9+.1,
    a:Math.random()*.5+.05,
    t:Math.random()*Math.PI*2,
    dt:Math.random()*.008+.003
  }));

  if(nebulaAF){cancelAnimationFrame(nebulaAF);nebulaAF=null;}
  bindNebulaEvents(canvas,c);
  runNebula(canvas);
}

function exitNebula(silent){
  if(nebulaAF){cancelAnimationFrame(nebulaAF);nebulaAF=null;}
  document.getElementById('cv-nebula-view').classList.remove('open');
  nebulaNodes=[];nebulaEdges=[];nebStars=[];
  // rebuild timeline after exit (if country still set)
  if(!silent&&currentCountry) initTimeline(currentCountry);
}

function runNebula(canvas){
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;

  function frame(t){
    nebulaAF=requestAnimationFrame(frame);
    ctx.clearRect(0,0,W,H);

    // deep space
    const bg=ctx.createRadialGradient(W*.4,H*.45,0,W*.5,H*.5,Math.max(W,H)*.75);
    bg.addColorStop(0,'rgba(18,8,4,1)');bg.addColorStop(.5,'rgba(6,4,12,1)');bg.addColorStop(1,'rgba(2,2,8,1)');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

    // twinkling stars
    nebStars.forEach(s=>{
      s.t+=s.dt;
      const a=s.a*(.5+.5*Math.sin(s.t));
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(245,237,224,${a})`;ctx.fill();
    });

    // nebula cloud glow behind primary nodes
    nebulaNodes.slice(0,Math.min(4,nebulaNodes.length)).forEach((n,i)=>{
      const hues=['28,12,4','14,22,58','38,14,52','4,30,18'];
      const nx=n.x+nebulaOff.x,ny=n.y+nebulaOff.y;
      const g=ctx.createRadialGradient(nx,ny,0,nx,ny,160);
      g.addColorStop(0,`rgba(${hues[i%4]},.12)`);g.addColorStop(1,`rgba(${hues[i%4]},0)`);
      ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    });

    // ── edges ──
    nebulaEdges.forEach(e=>{
      const na=nebulaNodes[e.a],nb=nebulaNodes[e.b];
      const isActive=nebulaHover===e.a||nebulaHover===e.b;
      const ax=na.x+nebulaOff.x,ay=na.y+nebulaOff.y;
      const bx=nb.x+nebulaOff.x,by=nb.y+nebulaOff.y;
      const eg=ctx.createLinearGradient(ax,ay,bx,by);
      eg.addColorStop(0,`rgba(255,210,80,${isActive?.9:.45})`);
      eg.addColorStop(1,`rgba(255,210,80,${isActive?.45:.2})`);
      ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);
      ctx.strokeStyle=eg;ctx.lineWidth=isActive?2.5:1.5;
      ctx.setLineDash([4,7]);ctx.stroke();ctx.setLineDash([]);
      // relation label at midpoint
      if(isActive){
        const mx=(ax+bx)*.5,my=(ay+by)*.5;
        ctx.font='bold 10px Cinzel,serif';ctx.fillStyle='#f0c84a';
        ctx.shadowColor='rgba(0,0,0,.9)';ctx.shadowBlur=4;
        ctx.textAlign='center';ctx.fillText(e.label,mx,my-5);
        ctx.shadowBlur=0;
      }
    });

    // ── nodes ──
    nebulaNodes.forEach((n,i)=>{
      if(!n||!n.item) return; // skip invalid nodes
      const isH=i===nebulaHover;
      const nx=n.x+nebulaOff.x,ny=n.y+nebulaOff.y,nr=n.r;
      const _cat=(n&&n.item&&n.item.cat)||'';
      const filtered=(nebulaFilter!=='all')&&!n.ghost&&_cat!==nebulaFilter;
      const dimmed=filtered?0.18:1;

      // outer glow
      const gR=nr*(isH?3.5:2);
      const gCol=n.ghost?'60,80,160':'201,148,60';
      const glow=ctx.createRadialGradient(nx,ny,nr*.3,nx,ny,gR);
      glow.addColorStop(0,`rgba(${gCol},${isH?.45:.18})`);glow.addColorStop(1,`rgba(${gCol},0)`);
      ctx.beginPath();ctx.arc(nx,ny,gR,0,Math.PI*2);ctx.fillStyle=glow;ctx.fill();

      // photo clip
      ctx.save();
      ctx.globalAlpha=filtered?0.2:1;
      ctx.beginPath();ctx.arc(nx,ny,nr,0,Math.PI*2);ctx.clip();
      if(n.imgOk&&n.img){
        ctx.filter=n.ghost?'brightness(.5) sepia(.3)':'brightness(.9) sepia(.05)';
        ctx.drawImage(n.img,nx-nr,ny-nr,nr*2,nr*2);
        ctx.filter='none';
        // darken edges of image
        const rim=ctx.createRadialGradient(nx,ny,nr*.4,nx,ny,nr);
        rim.addColorStop(0,'rgba(0,0,0,0)');rim.addColorStop(1,'rgba(0,0,0,.5)');
        ctx.fillStyle=rim;ctx.fill();
      } else {
        ctx.fillStyle=n.ghost?'rgba(20,25,55,.9)':'rgba(28,14,4,.9)';ctx.fill();
        ctx.font=`${nr*.85}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillStyle=n.ghost?'rgba(140,160,220,.9)':'rgba(255,210,80,1)';
        ctx.fillText(n.item.icon||'?',nx,ny);
        ctx.textBaseline='alphabetic';
      }
      ctx.restore();

      // border ring
      ctx.beginPath();ctx.arc(nx,ny,nr,0,Math.PI*2);
      const ringAlpha=(n.ghost?(isH?.7:.3):(isH?1:.75))*dimmed;
      ctx.strokeStyle=n.ghost?`rgba(100,140,255,${ringAlpha})`:`rgba(255,210,80,${ringAlpha})`;
      ctx.lineWidth=isH?3:2;ctx.stroke();
      ctx.globalAlpha=1; // reset after node

      // orbit arc when hovered
      if(isH&&!n.ghost){
        const ta=t*.0009;
        ctx.beginPath();ctx.arc(nx,ny,nr+10,ta,ta+Math.PI*.7);
        ctx.strokeStyle='rgba(201,168,76,.55)';ctx.lineWidth=1.5;ctx.stroke();
        ctx.beginPath();ctx.arc(nx,ny,nr+10,ta+Math.PI,ta+Math.PI*1.4);
        ctx.strokeStyle='rgba(201,168,76,.25)';ctx.lineWidth=1;ctx.stroke();
      }

      // label
      if(!n.ghost||isH){
        const raw=(n.item&&(langCur==='zh'?n.item.zh:n.item.en))||(n.item&&n.item.zh)||(n.item&&n.item.en)||'未知';
        const label=raw.length>14?raw.slice(0,13)+'…':raw;
        ctx.textAlign='center';
        ctx.shadowColor='rgba(0,0,0,1)';ctx.shadowBlur=10;
        ctx.font=isH?'bold 15px Noto Serif SC,serif':'bold 13px Noto Serif SC,serif';
        ctx.fillStyle=filtered?'rgba(255,255,255,.25)':isH?'#ffffff':n.ghost?'rgba(160,180,255,.8)':'#ffffff';
        ctx.fillText(label,nx,ny+nr+17);
        if(isH){
          ctx.font='bold 11px Cinzel,serif';
          ctx.fillStyle='#f0c84a';
          ctx.fillText(n.item.era,nx,ny+nr+31);
        }
        ctx.shadowBlur=0;
      }
    });
  }
  frame(0);
}

function bindNebulaEvents(canvas,c){
  function hitNode(mx,my){
    let best=-1,bestD=999;
    nebulaNodes.forEach((n,i)=>{
      const d=Math.hypot(mx-(n.x+nebulaOff.x),my-(n.y+nebulaOff.y));
      if(d<n.r+12&&d<bestD){bestD=d;best=i;}
    });
    return best;
  }

  canvas.addEventListener('mousedown',e=>{
    panState={sx:e.clientX,sy:e.clientY,ox:nebulaOff.x,oy:nebulaOff.y,moved:false};
  });
  canvas.addEventListener('mousemove',e=>{
    if(panState){
      const dx=e.clientX-panState.sx,dy=e.clientY-panState.sy;
      if(Math.hypot(dx,dy)>4){panState.moved=true;}
      if(panState.moved){
        nebulaOff.x=panState.ox+dx;nebulaOff.y=panState.oy+dy;
        canvas.classList.add('panning');
      }
      return;
    }
    const r=canvas.getBoundingClientRect();
    const h=hitNode(e.clientX-r.left,e.clientY-r.top);
    nebulaHover=h;
    canvas.style.cursor=h>=0?'pointer':'grab';
  });
  canvas.addEventListener('mouseup',e=>{
    if(panState&&!panState.moved){
      const r=canvas.getBoundingClientRect();
      const h=hitNode(e.clientX-r.left,e.clientY-r.top);
      if(h>=0&&nebulaNodes[h]&&nebulaNodes[h].item) openCard(nebulaNodes[h].item.id);
    }
    canvas.classList.remove('panning');
    panState=null;
  });
  canvas.addEventListener('mouseleave',()=>{nebulaHover=-1;panState=null;canvas.classList.remove('panning');});

  // touch pan + tap
  let tch=null;
  canvas.addEventListener('touchstart',e=>{const t=e.touches[0];tch={sx:t.clientX,sy:t.clientY,ox:nebulaOff.x,oy:nebulaOff.y,moved:false};e.preventDefault();},{passive:false});
  canvas.addEventListener('touchmove',e=>{if(!tch)return;const t=e.touches[0];const dx=t.clientX-tch.sx,dy=t.clientY-tch.sy;if(Math.hypot(dx,dy)>6)tch.moved=true;if(tch.moved){nebulaOff.x=tch.ox+dx;nebulaOff.y=tch.oy+dy;}e.preventDefault();},{passive:false});
  canvas.addEventListener('touchend',e=>{if(!tch)return;if(!tch.moved){const t=e.changedTouches[0];const r=canvas.getBoundingClientRect();const h=hitNode(t.clientX-r.left,t.clientY-r.top);if(h>=0&&nebulaNodes[h]&&nebulaNodes[h].item)openCard(nebulaNodes[h].item.id);}tch=null;e.preventDefault();},{passive:false});
}

function openCard(itemId){
  if(!currentCountry) return;
  const item=currentCountry.items.find(i=>i&&i.id===itemId);
  if(!item) return;
  currentItem=item;
  // gcard lives inside nebula-view — guard every access
  const G=id=>{return document.getElementById(id);};
  const gcard=G('gcard');
  const nebulaOpen=document.getElementById('cv-nebula-view')?.classList.contains('open');
  if(!gcard||!nebulaOpen) return; // only update card when nebula is visible
  
  const imgEl=G('gc-img'); const fbEl=G('gc-img-fb');
  if(imgEl){imgEl.src=item.img;imgEl.style.display='block';}
  if(fbEl){fbEl.style.display='none';fbEl.textContent=item.icon;}
  
  const _gca=G('gc-cat');if(_gca)_gca.textContent=langCur==='zh'?item.cat:CAT_EN[item.cat]||item.cat;
  const _gnm=G('gc-name');if(_gnm)_gnm.textContent=langCur==='zh'?item.zh:item.en;
  const _gne=G('gc-name-en');if(_gne)_gne.textContent=item.en;
  const _ger=G('gc-era');if(_ger)_ger.textContent=item.era;
  const _gbi=G('gc-bio');if(_gbi)_gbi.textContent=item.desc?(langCur==='zh'?item.desc.zh:item.desc.en):'';
  
  const _sd=G('gc-sec-desc');if(_sd)_sd.textContent=langCur==='zh'?'简介':'About';
  const _sf=G('gc-sec-facts');if(_sf)_sf.textContent=langCur==='zh'?'史料':'Facts';
  const _sl=G('gc-sec-links');if(_sl)_sl.textContent=langCur==='zh'?'深入探索':'Explore More';
  
  const gcFacts=G('gc-facts');
  if(gcFacts&&item.facts){
    const facts=langCur==='zh'?item.facts.zh:item.facts.en;
    gcFacts.innerHTML=facts.map(f=>`<div class="gc-fact"><div class="gc-fk">${f.k}</div><div class="gc-fv">${f.v}</div></div>`).join('');
  }
  
  const relsWrap=G('gc-rels-wrap'); const relsEl=G('gc-rels');
  if(relsWrap&&relsEl){
    if(item.rels&&item.rels.length){
      relsWrap.style.display='block';
      const _gsr=G('gc-sec-rels');if(_gsr)_gsr.textContent=langCur==='zh'?'历史关联':'Connections';
      relsEl.innerHTML=item.rels.map(r=>{
        const relItem=currentCountry.items.find(i=>i&&i.id===r.id)||COUNTRIES.flatMap(c=>(c.items||[])).filter(Boolean).find(i=>i.id===r.id);
        const name=relItem?(langCur==='zh'?relItem.zh:relItem.en):r.id;
        return `<div class="gc-rel" onclick="jumpToRel('${r.id}')"><div class="gc-rel-dot" style="background:var(--gold)"></div><div class="gc-rel-name">${name}</div><div class="gc-rel-type">${r.type}</div></div>`;
      }).join('');
    } else { relsWrap.style.display='none'; }
  }
  
  const gcLinks=G('gc-links');
  if(gcLinks) gcLinks.innerHTML=`
    <a class="gc-link gl-b" href="${item.baidu}" target="_blank" rel="noopener">🔍 百度百科</a>
    <a class="gc-link gl-w" href="${item.wiki}" target="_blank" rel="noopener">📖 维基百科</a>
    ${item.official?`<a class="gc-link gl-o" href="${item.official}" target="_blank" rel="noopener">🌐 官方/UNESCO</a>`:''}
  `;
  
  gcard.classList.add('open');
}

function jumpToRel(itemId){
  // Find which country has this item
  let targetCountry=currentCountry;
  let found=currentCountry.items.find(i=>i&&i.id===itemId);
  if(!found){
    for(const c of COUNTRIES){
      found=c.items.find(i=>i&&i.id===itemId);
      if(found){targetCountry=c;break}
    }
  }
  if(found){
    if(targetCountry.id!==currentCountry.id) openCountry(targetCountry);
    setTimeout(()=>openCard(itemId),200);
  }
}

function closeCard(){const gc=document.getElementById('gcard');if(gc)gc.classList.remove('open');currentItem=null;}

function toggleLang(){
  langCur=langCur==='zh'?'en':'zh';
  const zh=langCur==='zh';
  // Safe setters
  const S=(id,v)=>{try{const e=document.getElementById(id);if(e)e.textContent=v;}catch(ex){}};
  const Q=(sel,v)=>{try{const e=document.querySelector(sel);if(e)e.textContent=v;}catch(ex){}};
  const SA=(sel,attr,v)=>{try{const e=document.querySelector(sel);if(e)e.setAttribute(attr,v);}catch(ex){}};

  // ── Header buttons ──
  S('cv-lang-btn', zh?'EN':'中');
  S('glang-btn',   zh?'EN':'中');
  S('mlabel',      zh?'音乐':'Music');

  // ── Sidebar ──
  S('sp-title', zh?'文明列表':'Civilizations');
  SA('#search-inp','placeholder', zh?'搜索国家或文明...':'Search civilizations...');
  Q('.bc-universe', zh?'文明宇宙':'UNIVERSE');

  // ── Country view ──
  if(currentCountry){
    S('cv-name', zh?currentCountry.zh:currentCountry.en);
    S('cv-sub',  zh?currentCountry.tagline.zh:currentCountry.tagline.en);
    Q('.cv-back-label', zh?'返回':'Back');
  }

  // ── Nebula header ──
  S('nebula-back-btn', zh?'← 返回时间轴':'← Back to Timeline');
  S('nebula-hint',     zh?'拖拽漫游 · 点击节点探索':'Drag to explore · click nodes');

  // ── Filter buttons (both sets) ──
  document.querySelectorAll('.nf-btn').forEach(b=>{
    const cat=b.dataset.cat;
    if(cat==='all')       b.textContent=zh?'全部':'All';
    else if(cat==='遗迹') b.textContent=zh?'🏛 遗迹':'🏛 Sites';
    else if(cat==='历史人物') b.textContent=zh?'👤 人物':'👤 Figures';
    else if(cat==='文物') b.textContent=zh?'🏺 文物':'🏺 Artifacts';
    else if(cat==='博物馆') b.textContent=zh?'🏛 博物馆':'🏛 Museums';
  });

  // ── Nebula info panel ──
  const _nih=document.getElementById('nebula-info-hint');
  if(_nih)_nih.innerHTML=zh?'点击星云中的节点<br>查看详细信息':'Click nodes to<br>explore details';

  // ── Card back button ──
  Q('.gc-back-btn', zh?'← 返回星云':'← Back to Nebula');

  // ── gcard section labels (if card open) ──
  S('gc-sec-desc',  zh?'简介':'About');
  S('gc-sec-facts', zh?'史料':'Facts');
  S('gc-sec-links', zh?'深入探索':'Explore More');
  S('gc-sec-rels',  zh?'历史关联':'Connections');

  // ── Rebuild dynamic content ──
  if(currentCountry){
    try{ initTimeline(currentCountry); }catch(ex){}
    const _nv=document.getElementById('cv-nebula-view');
    if(currentItem&&_nv&&_nv.classList.contains('open')){
      try{ openCard(currentItem.id); }catch(ex){}
    }
  }
  try{ buildSidebar(); }catch(ex){}
}

function toggleGlobalLang(){
  toggleLang();
}

// AUDIO ENGINE — distinct per country
// ══════════════════════════════════════════════
let AC=null,mg=null,musicOn=false,musicTimer=null,musicNodes=[];

// Truly distinct scale & rhythm profiles per theme
const THEMES={
  // Egyptian/Arabic: Double harmonic / Hijaz scale
  middle_east:{
    scale:[261.63,277.18,329.63,349.23,392,415.30,493.88,523.25],
    bass:[65.41,73.42,82.41],tempo:0.32,vol:0.028,decay:1.8,
    pattern:[0,2,4,2,5,4,2,0],swing:0.15
  },
  // Chinese pentatonic (宫调式)
  chinese:{
    scale:[261.63,293.66,329.63,392,440,523.25,587.33,659.25],
    bass:[65.41,73.42,87.31],tempo:0.38,vol:0.025,decay:2.2,
    pattern:[0,2,3,2,5,3,2,5],swing:0
  },

function playMusic(theme){
  if(!musicOn) return;
  stopMusicSoft();
  try{
    if(!AC) AC=new(window.AudioContext||window.webkitAudioContext)();
    if(AC.state==='suspended') AC.resume();
    mg=AC.createGain();
    // Reverb chain
    const rv=AC.createDelay(1.5);rv.delayTime.value=0.18;
    const fb=AC.createGain();fb.gain.value=0.15;
    const wet=AC.createGain();wet.gain.value=0.22;
    const lp=AC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=2800;
    mg.connect(rv);rv.connect(lp);lp.connect(fb);fb.connect(rv);rv.connect(wet);wet.connect(AC.destination);
    mg.connect(AC.destination);
    mg.gain.setValueAtTime(0,AC.currentTime);
    mg.gain.linearRampToValueAtTime(0.55,AC.currentTime+2.5);
    scheduleMelody(theme);
    musicTimer=setInterval(()=>scheduleMelody(theme),40000);
  }catch(e){}
}

function scheduleMelody(themeName){
  const t=THEMES[themeName]||THEMES.european;
  const now=AC.currentTime+0.3;
  const {scale,bass,tempo,vol,decay,pattern,swing}=t;
  
  // Main melody — follow pattern
  for(let wave=0;wave<6;wave++){
    const ws=now+wave*6;
    for(let n=0;n<pattern.length;n++){
      const nt=ws+n*tempo*(1+swing*(n%2===1?0.15:0));
      const oct=Math.random()<0.25?2:1;
      const freq=scale[pattern[n]]*oct;
      playNote(freq,nt,decay,vol*(0.6+Math.random()*.4),'sine');
      // Harmony (5th above, softer)
      if(Math.random()<0.3) playNote(freq*1.5,nt+tempo*.5,decay*.7,vol*.15,'sine');
    }
    // Bass pulse every 2 beats
    for(let b=0;b<4;b++){
      const bt=ws+b*tempo*2;
      const bf=bass[b%bass.length];
      playNote(bf,bt,decay*.6,vol*.35,'triangle');
    }
  }
}

function playNote(freq,start,dur,vol,type='sine'){
  if(!AC||!mg) return;
  const o=AC.createOscillator(),g=AC.createGain(),f=AC.createBiquadFilter();
  f.type='lowpass';f.frequency.value=3200;
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(0,start);
  g.gain.linearRampToValueAtTime(vol,start+0.01);
  g.gain.exponentialRampToValueAtTime(vol*.4,start+dur*.25);
  g.gain.exponentialRampToValueAtTime(0.0001,start+dur);
  o.connect(f);f.connect(g);g.connect(mg);
  o.start(start);o.stop(start+dur+.1);
  musicNodes.push(o);
}

function stopMusicSoft(){
  if(musicTimer){clearInterval(musicTimer);musicTimer=null}
  musicNodes.forEach(o=>{try{o.stop()}catch(e){}});musicNodes=[];
}
function stopMusic(){
  stopMusicSoft();
  if(mg){mg.gain.linearRampToValueAtTime(0,AC?AC.currentTime+1:0);setTimeout(()=>mg=null,1500)}
}

function toggleMusic(){
  musicOn=!musicOn;
  const btn=document.getElementById('music-btn');btn.classList.toggle('on',musicOn);
  const _ml2=document.getElementById('mlabel');if(_ml2)_ml2.textContent=musicOn?(langCur==='zh'?'停止':'Stop'):(langCur==='zh'?'音乐':'Music');
  if(musicOn){
    const theme=currentCountry?currentCountry.music:'european';
    playMusic(theme);
  } else stopMusic();
}

let ts=null;
glC.addEventListener('touchstart',e=>{const t=e.touches[0];ts={x:t.clientX,y:t.clientY,rx:rotY,ry:rotX};e.preventDefault()},{passive:false});
glC.addEventListener('touchmove',e=>{if(!ts)return;const t=e.touches[0];rotY=ts.rx+(t.clientX-ts.x)*.008;rotX=Math.max(-.8,Math.min(.8,ts.ry+(t.clientY-ts.y)*.005));autoRot=false;e.preventDefault()},{passive:false});
glC.addEventListener('touchend',e=>{if(!ts)return;const t=e.changedTouches[0];if(Math.hypot(t.clientX-ts.x,t.clientY-ts.y)<10){const c=findAt(t.clientX,t.clientY);if(c)openCountry(c)}ts=null},{passive:false});
