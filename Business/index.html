<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Nexus · 商业版图趣味版</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap');
:root{
  --bg:#05070e;--b:rgba(255,255,255,0.09);--b2:rgba(255,255,255,0.05);
  --t:#f0f4ff;--m:rgba(240,244,255,0.55);--d:rgba(240,244,255,0.28);
  --a:#7dd3fc;--gold:#fcd34d;--rose:#f9a8d4;--green:#6ee7b7;--pw:310px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;font-family:'Inter',sans-serif;color:var(--t);user-select:none}
#app{display:flex;width:100%;height:100%}
#ga{flex:1;position:relative;overflow:hidden}
#sp{width:var(--pw);background:rgba(5,7,14,0.98);border-left:1px solid var(--b);display:flex;flex-direction:column;flex-shrink:0;position:relative;z-index:20}
canvas{position:absolute;inset:0}
#cs{z-index:0}#cg{z-index:1;cursor:grab}#cg.drag{cursor:grabbing}

/* TOP BAR */
#tb{position:absolute;top:0;left:0;right:0;z-index:30;padding:14px 20px;display:flex;align-items:center;gap:12px;background:linear-gradient(to bottom,rgba(5,7,14,.99),transparent);pointer-events:none}
#tb>*{pointer-events:auto}
.logo{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;letter-spacing:4px;color:var(--a);text-shadow:0 0 20px rgba(125,211,252,.5)}
.logo-s{font-size:9px;color:var(--d);letter-spacing:2px;margin-top:2px;font-family:'Inter',sans-serif}
.tbr{margin-left:auto;display:flex;align-items:center;gap:8px}
.ab{height:30px;padding:0 14px;border-radius:5px;border:1px solid var(--b);background:transparent;color:var(--m);font-family:'Inter',sans-serif;font-size:11px;font-weight:500;letter-spacing:.5px;cursor:pointer;transition:all .2s}
.ab:hover,.ab.on{border-color:var(--a);color:var(--a);background:rgba(125,211,252,.08)}

/* SIDEBAR */
.sph{padding:16px 16px 12px;border-bottom:1px solid var(--b);flex-shrink:0}
.spt{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;color:var(--t);margin-bottom:10px;text-transform:uppercase}
.sps{position:relative}
.sps input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--b);border-radius:5px;padding:8px 28px 8px 10px;color:var(--t);font-family:'Inter',sans-serif;font-size:12px;outline:none;transition:border-color .2s}
.sps input::placeholder{color:var(--d);font-size:11px}
.sps input:focus{border-color:rgba(125,211,252,.45)}
.sps .si{position:absolute;right:9px;top:50%;transform:translateY(-50%);color:var(--d);font-size:12px;pointer-events:none}
.spl{flex:1;overflow-y:auto;padding:4px 0;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.07) transparent}
.cr{display:flex;flex-direction:column;padding:9px 14px;cursor:pointer;transition:background .12s;border-bottom:1px solid rgba(255,255,255,.02)}
.cr:hover,.cr.active{background:rgba(125,211,252,.06)}
.cr.active .crn{color:var(--a)}
.cr-top{display:flex;align-items:center;gap:8px;width:100%}
.crf{font-size:16px;flex-shrink:0;width:22px;text-align:center}
.cri{flex:1;min-width:0}
.crn{font-size:12px;font-weight:600;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.crs{font-size:10px;color:var(--d);letter-spacing:.3px;margin-top:1px}
.crb{flex-shrink:0;display:flex;align-items:center;gap:0px;flex-direction:row}
.crbi{height:2px;border-radius:1px;background:var(--a);opacity:.5}
.crbc{font-size:10px;color:var(--d);width:18px;text-align:right}
/* Person bubble avatars in sidebar */
.cr-avatars{display:flex;flex-direction:row;align-items:center;margin-top:5px;flex-wrap:wrap;gap:3px}
.cr-av-bubble{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:7px;font-weight:800;font-family:'Syne',sans-serif;border:1.5px solid;flex-shrink:0;cursor:pointer;transition:transform .15s,box-shadow .15s}
.cr-av-bubble:hover{transform:scale(1.18);box-shadow:0 0 8px currentColor}

/* ZOOM */
#zw{position:absolute;bottom:56px;left:16px;z-index:30;display:flex;flex-direction:column;gap:4px}
.zb{width:30px;height:30px;border-radius:5px;border:1px solid var(--b);background:rgba(5,7,14,.9);color:var(--m);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:'Inter',sans-serif}
.zb:hover{border-color:var(--a);color:var(--a)}

/* BREADCRUMB */
#bc{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:7px;font-size:11px;letter-spacing:1px;color:var(--m);background:rgba(5,7,14,.88);border:1px solid var(--b);border-radius:20px;padding:7px 16px;white-space:nowrap;z-index:30;font-family:'Inter',sans-serif;font-weight:500}
.bci{cursor:pointer;transition:color .15s}.bci:hover,.bci.a{color:var(--a)}.bcs{opacity:.25}

/* TOOLTIP */
#tip{position:fixed;z-index:50;pointer-events:none;background:rgba(5,7,14,.97);border:1px solid rgba(125,211,252,.25);border-radius:6px;padding:7px 13px;font-size:11px;color:var(--t);opacity:0;transition:opacity .1s;white-space:nowrap;font-family:'Inter',sans-serif}

/* ═══ COUNTRY VIEW ═══ */
#cv{position:absolute;inset:0;z-index:25;display:none;flex-direction:column;background:rgba(5,7,14,.99)}
#cv.open{display:flex}
.cvh{padding:14px 18px;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:12px;flex-shrink:0;background:rgba(5,7,14,1)}
.cvbk{height:34px;padding:0 16px;border-radius:5px;border:1.5px solid var(--b);background:transparent;color:var(--m);cursor:pointer;font-size:13px;display:flex;align-items:center;gap:6px;transition:all .2s;flex-shrink:0;font-family:'Inter',sans-serif;font-weight:500}
.cvbk:hover{border-color:var(--a);color:var(--a)}
.cvn{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--t)}
.cvm{font-size:10px;color:var(--d);letter-spacing:1px;margin-top:2px}

/* Mode toggle */
.cvmode{margin-left:auto;display:flex;gap:6px;align-items:center}
.mvbtn{height:28px;padding:0 12px;border-radius:4px;border:1px solid var(--b);background:transparent;color:var(--d);font-size:10px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.5px;font-family:'Inter',sans-serif}
.mvbtn.active{border-color:var(--a);color:var(--a);background:rgba(125,211,252,.08)}

/* Sector filter */
.cvf{padding:8px 16px;display:flex;flex-wrap:wrap;gap:5px;flex-shrink:0;border-bottom:1px solid var(--b)}
.sc{display:inline-flex;align-items:center;gap:3px;padding:4px 11px;border-radius:20px;border:1px solid var(--b);font-size:10px;font-weight:500;letter-spacing:.5px;cursor:pointer;transition:all .18s;color:var(--d);font-family:'Inter',sans-serif}
.sc.on,.sc:hover{border-color:var(--a);color:var(--a);background:rgba(125,211,252,.07)}

/* GRID MODE */
#cvgrid{flex:1;overflow-y:auto;padding:14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;align-content:start;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.07) transparent}
.pc{background:rgba(255,255,255,.04);border:1px solid var(--b);border-radius:8px;padding:13px 11px;cursor:pointer;transition:all .18s;display:flex;flex-direction:column;align-items:center;text-align:center}
.pc:hover{background:rgba(255,255,255,.08);border-color:rgba(125,211,252,.25);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.pcav{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;margin-bottom:8px;border:2px solid;font-family:'Syne',sans-serif}
.pcrk{font-size:9px;letter-spacing:.5px;color:var(--gold);margin-bottom:3px;font-weight:600}
.pcn{font-size:12px;font-weight:600;color:var(--t);margin-bottom:3px;line-height:1.3;max-width:110px;font-family:'Inter',sans-serif}
.pcr{font-size:10px;color:var(--d);line-height:1.3;max-width:110px}

/* GRAPH MODE */
#cvgraph{flex:1;position:relative;display:none}
#graphCanvas{position:absolute;inset:0;width:100%;height:100%}
#graphHint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--d);background:rgba(5,7,14,.8);padding:5px 14px;border-radius:20px;border:1px solid var(--b);pointer-events:none;transition:opacity 1s;font-family:'Inter',sans-serif;white-space:nowrap}

/* ═══ PERSON DETAIL ═══ */
#pp{position:fixed;inset:0;z-index:80;background:rgba(5,7,14,.98);backdrop-filter:blur(20px);display:none;flex-direction:column}
#pp.open{display:flex}
.pph{padding:16px 20px;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:12px;flex-shrink:0;background:rgba(5,7,14,1)}

/* BIG HOME BUTTON */
.pp-home{
  height:46px;padding:0 28px;border-radius:8px;
  background:var(--a);border:none;color:#05070e;
  font-family:'Syne',sans-serif;font-size:15px;font-weight:800;letter-spacing:1px;
  cursor:pointer;display:flex;align-items:center;gap:8px;
  transition:all .2s;flex-shrink:0;
  box-shadow:0 0 24px rgba(125,211,252,.45);
}
.pp-home:hover{background:#bae6fd;box-shadow:0 0 36px rgba(125,211,252,.65);transform:scale(1.04)}
/* Floating back button inside detail content */
.pp-back-float{
  display:flex;justify-content:center;margin-bottom:22px;
}
.pp-back-btn{
  height:50px;padding:0 36px;border-radius:25px;
  background:linear-gradient(135deg,var(--a),#38bdf8);
  border:none;color:#05070e;
  font-family:'Syne',sans-serif;font-size:16px;font-weight:800;letter-spacing:.8px;
  cursor:pointer;display:flex;align-items:center;gap:10px;
  transition:all .25s;
  box-shadow:0 6px 28px rgba(125,211,252,.5);
}
.pp-back-btn:hover{transform:translateY(-2px);box-shadow:0 10px 36px rgba(125,211,252,.7);}
.pp-title-bar{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;color:var(--d);text-transform:uppercase}
.ppsc{flex:1;overflow-y:auto;padding:20px 24px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent;max-width:780px;margin:0 auto;width:100%}
.pp-top{display:flex;gap:20px;align-items:flex-start;margin-bottom:20px}
.ppav{width:72px;height:72px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;flex-shrink:0;border:2px solid;font-family:'Syne',sans-serif}
.ppname{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#fff;margin-bottom:4px;line-height:1.1}
.ppro{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;font-weight:500}
.ppnw{font-size:13px;color:var(--gold);font-weight:600;margin-bottom:4px}
.pp-section{margin:16px 0}
.pp-sec-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--d);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--b);font-weight:600}
.ppbio{font-size:14px;line-height:1.85;color:rgba(240,244,255,.75)}
.ppsg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.ppst{background:rgba(255,255,255,.04);border:1px solid var(--b);border-radius:6px;padding:10px;text-align:center}
.ppsv{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
.ppsk{font-size:9px;color:var(--d);letter-spacing:1px;margin-top:3px;text-transform:uppercase}
.ppchs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.ppch{font-size:11px;padding:4px 10px;border:1px solid rgba(255,255,255,.12);border-radius:4px;color:var(--m)}
.pplk{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:11px;border-radius:6px;border:1px solid;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;letter-spacing:.5px;cursor:pointer;text-decoration:none;transition:all .2s;margin-bottom:7px}
.lf{background:rgba(252,211,77,.06);border-color:rgba(252,211,77,.3);color:#fcd34d}
.lf:hover{background:rgba(252,211,77,.14)}
.ll{background:rgba(56,160,212,.06);border-color:rgba(56,160,212,.3);color:#60b8e0}
.ll:hover{background:rgba(56,160,212,.14)}

/* ═══ GRAPH SIDE CARD ═══ */
#gcard{
  position:absolute;top:0;right:0;width:300px;height:100%;
  background:rgba(5,7,14,0.97);border-left:1px solid rgba(255,255,255,0.1);
  z-index:40;display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .3s cubic-bezier(.22,1,.36,1);
  pointer-events:none;
}
#gcard.open{transform:translateX(0);pointer-events:auto;}
.gc-close{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:50%;
  border:1px solid rgba(255,255,255,0.15);background:transparent;color:rgba(240,244,255,0.5);
  cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;
  transition:all .2s;}
.gc-close:hover{border-color:var(--a);color:var(--a);}
.gc-avatar{width:70px;height:70px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:22px;font-weight:800;font-family:'Syne',sans-serif;
  margin:0 auto 12px;border:3px solid;}
.gc-name{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:#fff;
  text-align:center;line-height:1.2;margin-bottom:4px;}
.gc-role{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;text-align:center;
  margin-bottom:6px;font-weight:600;}
.gc-nw{font-size:13px;color:var(--gold);font-weight:700;text-align:center;margin-bottom:14px;}
.gc-body{flex:1;overflow-y:auto;padding:0 18px 18px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.07) transparent;}
.gc-sec-title{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(240,244,255,0.3);
  margin:14px 0 6px;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,0.07);font-weight:700;}
.gc-bio{font-size:12px;line-height:1.8;color:rgba(240,244,255,0.7);}
.gc-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px;}
.gc-tag{font-size:10px;padding:3px 9px;border:1px solid rgba(255,255,255,0.12);border-radius:3px;color:rgba(240,244,255,0.6);}
.gc-rels{display:flex;flex-direction:column;gap:5px;}
.gc-rel{display:flex;align-items:center;gap:7px;font-size:11px;padding:5px 8px;border-radius:5px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);}
.gc-rel-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.gc-rel-name{color:rgba(240,244,255,0.85);font-weight:600;flex:1;}
.gc-rel-type{font-size:9px;letter-spacing:.5px;text-transform:uppercase;font-weight:700;}
.gc-links{display:flex;flex-direction:column;gap:6px;}
.gc-link{display:flex;align-items:center;justify-content:center;gap:7px;padding:9px 12px;
  border-radius:6px;border:1px solid;font-size:11px;font-weight:600;letter-spacing:.4px;
  cursor:pointer;text-decoration:none;transition:all .2s;font-family:'Inter',sans-serif;}
.gc-lf{background:rgba(252,211,77,.05);border-color:rgba(252,211,77,.3);color:#fcd34d;}
.gc-lf:hover{background:rgba(252,211,77,.12);}
.gc-lw{background:rgba(180,180,255,.05);border-color:rgba(180,180,255,.25);color:#c4b5fd;}
.gc-lw:hover{background:rgba(180,180,255,.12);}
.gc-ll{background:rgba(56,160,212,.05);border-color:rgba(56,160,212,.28);color:#60b8e0;}
.gc-ll:hover{background:rgba(56,160,212,.12);}
.gc-header{padding:22px 18px 14px;border-bottom:1px solid rgba(255,255,255,0.07);}

</style>
</head>
<body>
<div id="app">
  <div id="ga">
    <canvas id="cs"></canvas>
    <canvas id="cg"></canvas>
    <div id="tb">
      <div><div class="logo">NOVA GRAPH</div><div class="logo-s" id="logo-s">全球精英图谱 · KNOWLEDGE UNIVERSE</div></div>
      <div class="tbr">
        <button class="ab" id="aBtn" onclick="toggleAudio()">♪ <span id="music-label">音乐</span></button>
        <button class="ab" id="lBtn" onclick="toggleLang()">EN</button>
      </div>
    </div>
    <div id="cv">
      <div class="cvh">
        <button class="cvbk" onclick="closeCV()">← <span id="back-globe-label">返回地球</span></button>
        <div><div class="cvn" id="cvn"></div><div class="cvm" id="cvm"></div></div>
        <div class="cvmode">
          <button class="mvbtn active" id="btnGrid" onclick="setMode('grid')" id="btn-grid">⊞ <span id="mode-grid-label">卡片</span></button>
          <button class="mvbtn" id="btnGraph" onclick="setMode('graph')" id="btn-graph">⬡ <span id="mode-graph-label">图谱</span></button>
        </div>
      </div>
      <div class="cvf" id="cvf"></div>
      <div id="cvgrid"></div>
      <div id="cvgraph">
        <canvas id="graphCanvas"></canvas>
        <div id="graphHint" id="graph-hint">点击节点查看详情 · 拖拽平移 · 滚轮缩放</div>
        <div id="gcard">
          <div class="gc-header" id="gc-header"></div>
          <div class="gc-body" id="gc-body"></div>
          <button class="gc-close" onclick="closeGCard()">✕</button>
        </div>
      </div>
    </div>
    <div id="bc"><span class="bci a" onclick="closeCV()">🌌 <span id="bc-globe">宇宙</span></span></div>
    <div id="zw">
      <button class="zb" onclick="zoom=Math.min(4,zoom*1.2)">+</button>
      <button class="zb" onclick="zoom=Math.max(0.4,zoom/1.2)">−</button>
      <button class="zb" style="font-size:10px" onclick="zoom=1;rY=0.38;rX=0.12">↺</button>
    </div>
  </div>
  <div id="sp">
    <div class="sph">
      <div class="spt" id="sidebar-title">Countries</div>
      <div class="sps"><input type="text" id="csi" placeholder="搜索国家或人物…" autocomplete="off"><span class="si">⌕</span></div>
    </div>
    <div class="spl" id="spl"></div>
  </div>
</div>
<div id="tip"></div>

<!-- PERSON DETAIL (fullscreen) -->
<div id="pp">
  <div class="pph">
    <button class="pp-home" onclick="closeDetail()">← 🌍 <span id="pp-home-label">返回地球主页</span></button>
    <div class="pp-title-bar" id="pp-title-bar">人物详情</div>
  </div>
  <div class="ppsc" id="ppsc"></div>
</div>

<script>
"use strict";

// ═══════════════════════════════════════════
// I18N
// ═══════════════════════════════════════════
let LANG = "zh";
const I18N = {
  zh: {
    "logo-s":"全球精英图谱 · KNOWLEDGE UNIVERSE",
    "back-globe-label":"返回地球",
    "music-label":"音乐",
    "mode-grid-label":"卡片",
    "mode-graph-label":"图谱",
    "sidebar-title":"国家列表",
    "csi-placeholder":"搜索国家或人物…",
    "bc-globe":"宇宙",
    "pp-home-label":"返回地球主页",
    "pp-title-bar":"人物详情",
    "graph-hint":"点击节点查看详情 · 拖拽平移 · 滚轮缩放",
    "sec-all":"全部","click-explore":"点击探索",
    "bio-label":"简介","data-label":"数据","skills-label":"核心标签","links-label":"外部链接",
    "forbes-btn":"Forbes 主页","linkedin-btn":"LinkedIn 搜索",
    "forbes-rank":"Forbes排名","net-worth":"净资产","sector":"领域",
    "people-count":"人物","continent":"大洲",
  },
  en: {
    "logo-s":"GLOBAL ELITE NETWORK · KNOWLEDGE UNIVERSE",
    "back-globe-label":"Back to Globe",
    "music-label":"Music",
    "mode-grid-label":"Cards",
    "mode-graph-label":"Graph",
    "sidebar-title":"Countries",
    "csi-placeholder":"Search country or person…",
    "bc-globe":"Globe",
    "pp-home-label":"Back to Home",
    "pp-title-bar":"Person Detail",
    "graph-hint":"Click node for details · Drag to pan · Scroll to zoom",
    "sec-all":"All","click-explore":"Click to explore",
    "bio-label":"About","data-label":"Stats","skills-label":"Key Tags","links-label":"Links",
    "forbes-btn":"Forbes Profile","linkedin-btn":"LinkedIn Search",
    "forbes-rank":"Forbes Rank","net-worth":"Net Worth","sector":"Sector",
    "people-count":"People","continent":"Continent",
  }
};
function i(key){ return I18N[LANG][key] || key; }
function applyLang(){
  const ids = ["logo-s","back-globe-label","music-label","mode-grid-label","mode-graph-label",
    "sidebar-title","bc-globe","pp-home-label","pp-title-bar","graph-hint"];

// GRAPH (FORCE-DIRECTED)
// ═══════════════════════════════════════════
let gNodes=[], gEdges=[], gTransform={x:0,y:0,scale:1};
let gDragNode=null, gDragOff={x:0,y:0}, gPanStart=null, gPanOrig=null;
let gSelectedId=null;
let graphMode=false;

function buildGraphData(country){
  const canvas=document.getElementById("graphCanvas");
  const W=canvas.width||canvas.offsetWidth;
  const H=canvas.height||canvas.offsetHeight;
  const cx=W/2, cy=H/2;

  const sectors=[...new Set(country.p.map(p=>p.s))];
  const sectorR=Math.min(W,H)*0.38;
  const clusterNodes=sectors.map((s,i)=>{
    const a=(i/sectors.length)*Math.PI*2-Math.PI/2;
    return{id:"c_"+s,type:"cluster",sector:s,
      x:cx+Math.cos(a)*sectorR,y:cy+Math.sin(a)*sectorR,
      r:46,fx:cx+Math.cos(a)*sectorR,fy:cy+Math.sin(a)*sectorR};
  });

  // Group people by sector for deterministic orbit placement
  const secPeople={};
  country.p.forEach(p=>{if(!secPeople[p.s])secPeople[p.s]=[];secPeople[p.s].push(p);});

  const personNodes=[];
  clusterNodes.forEach(cl=>{
    const ppl=secPeople[cl.sector]||[];
    const orbitR=ppl.length===1?0:Math.max(95,Math.min(145,80+ppl.length*10));
    ppl.forEach((p,i)=>{
      const a=ppl.length===1?0:(i/ppl.length)*Math.PI*2-Math.PI/2;
      personNodes.push({
        id:p.e,type:"person",person:p,
        x:cl.x+(ppl.length===1?0:Math.cos(a)*orbitR),
        y:cl.y+(ppl.length===1?0:Math.sin(a)*orbitR),
        r:30,vx:0,vy:0
      });
    });
  });

  const nodes=[...clusterNodes,...personNodes];
  const edges=[];
  personNodes.forEach(pn=>{
    const cl=clusterNodes.find(c=>c.sector===pn.person.s);
    if(cl) edges.push({a:pn.id,b:cl.id,type:"sector"});
  });

  // Same-sector peer edges (the network connections between people)
  const secGroups={};
  personNodes.forEach(pn=>{
    if(!secGroups[pn.person.s])secGroups[pn.person.s]=[];
    secGroups[pn.person.s].push(pn);
  });
  Object.values(secGroups).forEach(grp=>{
    if(grp.length<2)return;
    if(grp.length<=5){
      for(let i=0;i<grp.length;i++)
        for(let j=i+1;j<grp.length;j++)
          edges.push({a:grp[i].id,b:grp[j].id,type:"peer"});
    }else{
      for(let i=0;i<grp.length;i++){
        edges.push({a:grp[i].id,b:grp[(i+1)%grp.length].id,type:"peer"});
        edges.push({a:grp[i].id,b:grp[(i+2)%grp.length].id,type:"peer"});
      }
    }
  });

  // ── RELS-based edges (compete / supply / partner)
  const allPersonNames=new Set(personNodes.map(n=>n.person.e));
  RELS.forEach(r=>{
    const aIn=allPersonNames.has(r.a);
    const bIn=allPersonNames.has(r.b);
    if(aIn&&bIn){
      // both in this country view — draw intra edge
      edges.push({a:r.a,b:r.b,type:r.type,zh:r.zh,en:r.en});
    }
  });

  // Force sim: resolve node overlaps while keeping orbit structure
  for(let step=0;step<220;step++){
    for(let i=0;i<personNodes.length;i++){
      for(let j=i+1;j<personNodes.length;j++){
        const A=personNodes[i],B=personNodes[j];
        const dx=B.x-A.x,dy=B.y-A.y,d=Math.sqrt(dx*dx+dy*dy)||1;
        const minD=A.r+B.r+14;
        if(d<minD){const f=(minD-d)*0.2/d;A.vx-=dx*f;A.vy-=dy*f;B.vx+=dx*f;B.vy+=dy*f;}
      }
    }
    personNodes.forEach(n=>{
      const cl=clusterNodes.find(c=>c.sector===n.person.s);if(!cl)return;
      const grp=secGroups[n.person.s];const idx=grp.indexOf(n);
      const orbitR=grp.length===1?0:Math.max(95,Math.min(145,80+grp.length*10));
      const a=grp.length===1?0:(idx/grp.length)*Math.PI*2-Math.PI/2;
      const tx=cl.x+(grp.length===1?0:Math.cos(a)*orbitR);
      const ty=cl.y+(grp.length===1?0:Math.sin(a)*orbitR);
      n.vx+=(tx-n.x)*0.09;n.vy+=(ty-n.y)*0.09;
      n.x+=n.vx*0.5;n.y+=n.vy*0.5;n.vx*=0.65;n.vy*=0.65;
    });
  }
  personNodes.forEach(n=>{n.vx=0;n.vy=0;});
  return{nodes,edges};
}

function drawGraph(){
  const canvas=document.getElementById("graphCanvas");
  if(!canvas)return;
  const ctx=canvas.getContext("2d");
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);

  // Dark bg with subtle grain
  ctx.fillStyle="rgba(5,7,14,1)";
  ctx.fillRect(0,0,W,H);

  ctx.save();
  ctx.translate(gTransform.x,gTransform.y);
  ctx.scale(gTransform.scale,gTransform.scale);

  // ── Sector halos: large soft glow clouds
  gNodes.filter(n=>n.type==="cluster").forEach(cl=>{
    const col=SEC[cl.sector]||"#7dd3fc";
    const members=gNodes.filter(n=>n.type==="person"&&n.person.s===cl.sector);
    if(!members.length)return;
    const allPts=[{x:cl.x,y:cl.y,r:cl.r},...members.map(n=>({x:n.x,y:n.y,r:n.r}))];
    const centX=allPts.reduce((s,p)=>s+p.x,0)/allPts.length;
    const centY=allPts.reduce((s,p)=>s+p.y,0)/allPts.length;
    const haloR=Math.max(...allPts.map(p=>Math.hypot(p.x-centX,p.y-centY)+p.r))+38;
    const gr=ctx.createRadialGradient(centX,centY,haloR*0.05,centX,centY,haloR);
    gr.addColorStop(0,col+"20");gr.addColorStop(0.55,col+"0d");gr.addColorStop(1,col+"00");
    ctx.beginPath();ctx.arc(centX,centY,haloR,0,Math.PI*2);
    ctx.fillStyle=gr;ctx.fill();
    // Dashed boundary ring
    ctx.beginPath();ctx.arc(centX,centY,haloR*0.85,0,Math.PI*2);
    ctx.strokeStyle=col+"28";ctx.lineWidth=1;ctx.setLineDash([5,8]);ctx.stroke();ctx.setLineDash([]);
  });

  // ── Draw all edges FIRST (under nodes)
  // Peer edges (same sector, light)
  gEdges.filter(e=>e.type==="peer").forEach(e=>{
    const A=gNodes.find(n=>n.id===e.a),B=gNodes.find(n=>n.id===e.b);
    if(!A||!B)return;
    const col=SEC[A.person?.s||B.person?.s]||"#7dd3fc";
    ctx.beginPath();ctx.moveTo(A.x,A.y);ctx.lineTo(B.x,B.y);
    ctx.strokeStyle=col+"30";ctx.lineWidth=1;ctx.setLineDash([3,5]);ctx.stroke();ctx.setLineDash([]);
  });
  // Sector hub edges
  gEdges.filter(e=>e.type==="sector").forEach(e=>{
    const A=gNodes.find(n=>n.id===e.a),B=gNodes.find(n=>n.id===e.b);
    if(!A||!B)return;
    const col=SEC[B.type==="cluster"?B.sector:A.sector]||"#7dd3fc";
    ctx.beginPath();ctx.moveTo(A.x,A.y);ctx.lineTo(B.x,B.y);
    ctx.strokeStyle=col+"40";ctx.lineWidth=1.5;ctx.stroke();
  });

  // ── RELS edges with curved paths for clarity
  function drawCurvedEdge(A,B,col,dash,width,alpha,label){
    if(!A||!B)return;
    const dx=B.x-A.x,dy=B.y-A.y,dist=Math.sqrt(dx*dx+dy*dy)||1;
    const nx=dx/dist,ny=dy/dist;
    const sx=A.x+nx*A.r,sy=A.y+ny*A.r;
    const ex=B.x-nx*B.r,ey=B.y-ny*B.r;
    // Slightly curved
    const mx=(sx+ex)/2-ny*18,my=(sy+ey)/2+nx*18;
    ctx.beginPath();ctx.moveTo(sx,sy);ctx.quadraticCurveTo(mx,my,ex,ey);
    ctx.strokeStyle=col;ctx.globalAlpha=alpha;ctx.lineWidth=width;
    if(dash)ctx.setLineDash(dash);ctx.stroke();ctx.setLineDash([]);ctx.globalAlpha=1;
    // Label
    if(label){
      const lx=(sx+mx+ex)/3,ly=(sy+my+ey)/3;
      ctx.save();ctx.font="bold 9px Inter,sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";
      const tw=ctx.measureText(label).width;
      ctx.fillStyle="rgba(5,7,14,0.88)";ctx.beginPath();ctx.roundRect(lx-tw/2-5,ly-8,tw+10,16,4);ctx.fill();
      ctx.fillStyle=col;ctx.globalAlpha=0.95;ctx.fillText(label,lx,ly);ctx.globalAlpha=1;
      ctx.restore();
    }
  }
  function drawArrow(A,B,col,alpha){
    if(!A||!B)return;
    const dx=B.x-A.x,dy=B.y-A.y,dist=Math.sqrt(dx*dx+dy*dy)||1;
    const nx=dx/dist,ny=dy/dist;
    const ex=B.x-nx*B.r,ey=B.y-ny*B.r;
    const headLen=13,headAng=0.42;
    ctx.beginPath();
    ctx.moveTo(ex,ey);
    ctx.lineTo(ex-Math.cos(Math.atan2(dy,dx)-headAng)*headLen,ey-Math.sin(Math.atan2(dy,dx)-headAng)*headLen);
    ctx.moveTo(ex,ey);
    ctx.lineTo(ex-Math.cos(Math.atan2(dy,dx)+headAng)*headLen,ey-Math.sin(Math.atan2(dy,dx)+headAng)*headLen);
    ctx.strokeStyle=col;ctx.globalAlpha=alpha;ctx.lineWidth=2.5;ctx.stroke();ctx.globalAlpha=1;
  }
  gEdges.filter(e=>e.type==="supply").forEach(e=>{
    const A=gNodes.find(n=>n.id===e.a),B=gNodes.find(n=>n.id===e.b);
    const label=LANG==="zh"?e.zh:e.en;
    drawCurvedEdge(A,B,"#6ee7b7",null,2.5,0.85,label);
    drawArrow(A,B,"#6ee7b7",0.9);
  });
  gEdges.filter(e=>e.type==="compete").forEach(e=>{
    const A=gNodes.find(n=>n.id===e.a),B=gNodes.find(n=>n.id===e.b);
    const label=LANG==="zh"?e.zh:e.en;
    drawCurvedEdge(A,B,"#f87171",[6,4],2.5,0.85,label);
  });
  gEdges.filter(e=>e.type==="partner").forEach(e=>{
    const A=gNodes.find(n=>n.id===e.a),B=gNodes.find(n=>n.id===e.b);
    const label=LANG==="zh"?e.zh:e.en;
    drawCurvedEdge(A,B,"#c4b5fd",[3,5],2,0.75,label);
  });

  // ── Cluster (sector hub) nodes — prominent hexagonal-ish
  gNodes.filter(n=>n.type==="cluster").forEach(n=>{
    const col=SEC[n.sector]||"#7dd3fc";
    // Outer glow
    ctx.beginPath();ctx.arc(n.x,n.y,n.r+14,0,Math.PI*2);
    const glowG=ctx.createRadialGradient(n.x,n.y,n.r-4,n.x,n.y,n.r+14);
    glowG.addColorStop(0,col+"44");glowG.addColorStop(1,col+"00");
    ctx.fillStyle=glowG;ctx.fill();
    // Main filled circle
    ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
    const gr=ctx.createRadialGradient(n.x-n.r*.25,n.y-n.r*.25,0,n.x,n.y,n.r);
    gr.addColorStop(0,col+"cc");gr.addColorStop(1,col+"66");
    ctx.fillStyle=gr;ctx.fill();
    ctx.strokeStyle="#fff";ctx.lineWidth=2.5;ctx.globalAlpha=0.7;ctx.stroke();ctx.globalAlpha=1;
    // Sector label
    const name=sn(n.sector).toUpperCase();
    ctx.fillStyle="#05070e";ctx.textAlign="center";ctx.textBaseline="middle";ctx.font="bold 12px Syne,sans-serif";
    if(name.length<=7){ctx.fillText(name,n.x,n.y);}
    else{const words=sn(n.sector).split(" ");ctx.font="bold 10px Syne,sans-serif";ctx.fillText(words[0].toUpperCase(),n.x,n.y-7);ctx.fillText(words.slice(1).join(" ").toUpperCase(),n.x,n.y+7);}
  });

  // ── Person nodes — vibrant colored circles (like reference image)
  gNodes.filter(n=>n.type==="person").forEach(n=>{
    const p=n.person;
    const col=SEC[p.s]||"#7dd3fc";
    const sel=n.id===gSelectedId;
    const ini=p.e.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
    const personalCol=strColor(p.e);

    // Outer selection ring
    if(sel){
      ctx.beginPath();ctx.arc(n.x,n.y,n.r+13,0,Math.PI*2);
      ctx.strokeStyle="#fff";ctx.lineWidth=2;ctx.globalAlpha=0.6;ctx.stroke();ctx.globalAlpha=1;
      ctx.beginPath();ctx.arc(n.x,n.y,n.r+8,0,Math.PI*2);
      ctx.fillStyle=col+"44";ctx.fill();
    }

    // Glow
    ctx.beginPath();ctx.arc(n.x,n.y,n.r+6,0,Math.PI*2);
    const glowG=ctx.createRadialGradient(n.x,n.y,n.r-3,n.x,n.y,n.r+6);
    glowG.addColorStop(0,personalCol+(sel?"88":"44"));glowG.addColorStop(1,personalCol+"00");
    ctx.fillStyle=glowG;ctx.fill();

    // Main circle — vivid solid fill like reference image
    ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
    const bodyG=ctx.createRadialGradient(n.x-n.r*.3,n.y-n.r*.3,0,n.x,n.y,n.r);
    bodyG.addColorStop(0,personalCol+"ff");bodyG.addColorStop(1,personalCol+"cc");
    ctx.fillStyle=bodyG;ctx.fill();

    // Sector-color ring border
    ctx.strokeStyle=sel?"#fff":col;ctx.lineWidth=sel?3.5:2.8;ctx.stroke();

    // White inner circle for initials
    ctx.beginPath();ctx.arc(n.x,n.y,n.r*0.60,0,Math.PI*2);
    ctx.fillStyle="rgba(255,255,255,0.92)";ctx.fill();

    // Initials in dark color
    ctx.fillStyle="#111";ctx.font=`bold ${sel?14:12}px Syne,sans-serif`;
    ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(ini,n.x,n.y);

    // Name label below node
    const nm=LANG==="zh"?(p.n||p.e).split(/[\s·]/)[0]:p.e.split(" ")[0];
    ctx.fillStyle=sel?"#fff":col;ctx.font=(sel?"bold ":"")+"11px Inter,sans-serif";
    ctx.textBaseline="top";ctx.textAlign="center";
    // Shadow for readability
    ctx.shadowColor="rgba(5,7,14,0.9)";ctx.shadowBlur=6;
    ctx.fillText(nm,n.x,n.y+n.r+5);
    ctx.shadowBlur=0;

    // Forbes rank badge
    if(p.rk){
      ctx.fillStyle=SEC.invest;ctx.font="bold 10px Inter,sans-serif";
      ctx.textBaseline="bottom";ctx.fillText("#"+p.rk,n.x,n.y-n.r-3);
    }
  });
  ctx.restore();

  // ── Legend overlay (screen space)
  const legendItems=[
    {col:"#6ee7b7",dash:null,arrow:true,label:LANG==="zh"?"供应关系":"Supply"},
    {col:"#f87171",dash:[6,4],arrow:false,label:LANG==="zh"?"竞争关系":"Compete"},
    {col:"#c4b5fd",dash:[3,5],arrow:false,label:LANG==="zh"?"合作关系":"Partnership"},
  ];
  const lx0=16,ly0=16,lh=24;
  ctx.save();
  legendItems.forEach((item,i)=>{
    const ly=ly0+i*lh;
    ctx.fillStyle="rgba(5,7,14,0.88)";ctx.beginPath();
    if(ctx.roundRect)ctx.roundRect(lx0,ly,138,19,4);else ctx.rect(lx0,ly,138,19);
    ctx.fill();
    ctx.beginPath();ctx.moveTo(lx0+7,ly+9.5);ctx.lineTo(lx0+30,ly+9.5);
    if(item.dash)ctx.setLineDash(item.dash);
    ctx.strokeStyle=item.col;ctx.lineWidth=2.2;ctx.globalAlpha=0.9;ctx.stroke();
    ctx.setLineDash([]);ctx.globalAlpha=1;
    if(item.arrow){
      ctx.beginPath();ctx.moveTo(lx0+30,ly+9.5);
      ctx.lineTo(lx0+24,ly+6);ctx.moveTo(lx0+30,ly+9.5);ctx.lineTo(lx0+24,ly+13);
      ctx.strokeStyle=item.col;ctx.lineWidth=2;ctx.stroke();
    }
    ctx.fillStyle=item.col;ctx.font="bold 10px Inter,sans-serif";
    ctx.textAlign="left";ctx.textBaseline="middle";ctx.fillText(item.label,lx0+36,ly+9.5);
  });
  ctx.restore();
}

function strColor(s){
  const cols=["#ef4444","#f97316","#eab308","#22c55e","#14b8a6","#3b82f6","#8b5cf6","#ec4899","#06b6d4","#f43f5e","#84cc16","#f59e0b","#6366f1","#10b981","#0ea5e9","#a855f7","#fb923c","#34d399"];
  let h=0;for(let c of s)h=(h*31+c.charCodeAt(0))%cols.length;
  return cols[Math.abs(h)];
}

function getGraphPos(e){
  const c=document.getElementById("graphCanvas");
  const r=c.getBoundingClientRect();
  return{x:(e.clientX-r.left-gTransform.x)/gTransform.scale,y:(e.clientY-r.top-gTransform.y)/gTransform.scale};
}
function graphHit(x,y){
  return gNodes.slice().reverse().find(n=>{const dx=n.x-x,dy=n.y-y;return Math.sqrt(dx*dx+dy*dy)<=n.r+4;})||null;
}

function setupGraphCanvas(){
  const c=document.getElementById("graphCanvas");
  let mouseDownPos={x:0,y:0};
  let didDrag=false;

  c.addEventListener("mousedown",e=>{
    mouseDownPos={x:e.clientX,y:e.clientY};
    didDrag=false;
    const pos=getGraphPos(e);const nd=graphHit(pos.x,pos.y);
    if(nd&&nd.type==="person"){gDragNode=nd;gDragOff={x:nd.x-pos.x,y:nd.y-pos.y};}
    else{gPanStart={x:e.clientX,y:e.clientY};gPanOrig={...gTransform};}
  });
  c.addEventListener("mousemove",e=>{
    // Mark as drag if mouse moved more than 4px
    if(Math.hypot(e.clientX-mouseDownPos.x,e.clientY-mouseDownPos.y)>4) didDrag=true;
    const pos=getGraphPos(e);
    if(gDragNode&&didDrag){gDragNode.x=pos.x+gDragOff.x;gDragNode.y=pos.y+gDragOff.y;drawGraph();}
    else if(gPanStart&&didDrag){gTransform.x=gPanOrig.x+(e.clientX-gPanStart.x);gTransform.y=gPanOrig.y+(e.clientY-gPanStart.y);drawGraph();}
    else if(!gDragNode&&!gPanStart){
      const nd=graphHit(pos.x,pos.y);
      c.style.cursor=nd?"pointer":"grab";
      const tt=document.getElementById("tip");
      if(nd&&nd.type==="person"){
        const p=nd.person;
        const nm=LANG==="zh"?(p.n||p.e):p.e;
        tt.innerHTML=`<strong>${nm}</strong><br><span style="color:var(--d);font-size:10px">${p.role[LANG]||p.role.en}</span>`;
        tt.style.opacity="1";tt.style.left=(e.clientX+14)+"px";tt.style.top=(e.clientY-10)+"px";
      }else{tt.style.opacity="0";}
    }
  });
  c.addEventListener("mouseup",e=>{
    const wasDraggingNode=gDragNode&&didDrag;
    const wasPanning=gPanStart&&didDrag;
    const clickedNode=gDragNode; // save before clearing

    gDragNode=null;
    gPanStart=null;

    if(wasDraggingNode||wasPanning){return;} // was a real drag, ignore

    // It was a click — check what was hit
    const pos=getGraphPos(e);
    const nd=graphHit(pos.x,pos.y);
    if(nd&&nd.type==="person"){
      gSelectedId=nd.id;drawGraph();showGraphCard(nd.person);
    } else {
      gSelectedId=null;drawGraph();
    }
  });
  c.addEventListener("wheel",e=>{
    e.preventDefault();
    const r=c.getBoundingClientRect();
    const mx=e.clientX-r.left,my=e.clientY-r.top;
    const ns=Math.max(0.3,Math.min(3,gTransform.scale*(1-e.deltaY*0.001)));
    gTransform.x=mx-(mx-gTransform.x)*(ns/gTransform.scale);
    gTransform.y=my-(my-gTransform.y)*(ns/gTransform.scale);
    gTransform.scale=ns;drawGraph();
  },{passive:false});
  window.addEventListener("resize",()=>{
    if(graphMode){
      c.width=c.offsetWidth;c.height=c.offsetHeight;drawGraph();
    }
  });
}

        <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>

let STATE="globe", activeC=null, activeSec="all", currentMode="graph";

function setMode(mode){
  currentMode=mode;
  document.getElementById("btnGrid").classList.toggle("active",mode==="grid");
  document.getElementById("btnGraph").classList.toggle("active",mode==="graph");
  document.getElementById("cvgrid").style.display=mode==="grid"?"grid":"none";
  document.getElementById("cvgraph").style.display=mode==="graph"?"block":"none";
  if(mode==="graph"&&activeC){
    graphMode=true;
    gTransform={x:0,y:0,scale:1};gSelectedId=null;
    const canvas=document.getElementById("graphCanvas");
    setTimeout(()=>{
      canvas.width=canvas.offsetWidth;canvas.height=canvas.offsetHeight;
      const {nodes,edges}=buildGraphData(DATA.find(c=>c.id===activeC));
      gNodes=nodes;gEdges=edges;
      // Auto-fit: find bounding box and center/scale
      const personN=nodes.filter(n=>n.type==="person");
      if(personN.length>0){
        const xs=personN.map(n=>n.x),ys=personN.map(n=>n.y);
        const minX=Math.min(...xs)-50,maxX=Math.max(...xs)+50;
        const minY=Math.min(...ys)-50,maxY=Math.max(...ys)+50;
        const scaleX=canvas.width/(maxX-minX),scaleY=canvas.height/(maxY-minY);
        const sc=Math.min(scaleX,scaleY,1.1)*0.85;
        gTransform={scale:sc,x:(canvas.width-(minX+maxX)*sc)/2,y:(canvas.height-(minY+maxY)*sc)/2};
      }
      drawGraph();
      setTimeout(()=>{const h=document.getElementById("graphHint");if(h)h.style.opacity="0";},4000);
    },30);
  }else{graphMode=false;}
}

function openC(id){
  activeC=id;STATE="country";hovC=null;
  document.getElementById("tip").style.opacity="0";
  renderCV(id);
  document.querySelectorAll(".cr").forEach(r=>r.classList.toggle("active",r.dataset.id===id));
}

window.closeCV=function(){
  STATE="globe";activeC=null;graphMode=false;
  document.getElementById("cv").classList.remove("open");
  document.querySelectorAll(".cr").forEach(r=>r.classList.remove("active"));
  document.getElementById("bc").innerHTML=`<span class="bci a" onclick="closeCV()">🌌 <span id="bc-globe">${i("bc-globe")}</span></span>`;
};

function renderCV(id){
  const c=DATA.find(x=>x.id===id);if(!c)return;
  document.getElementById("cvn").textContent=c.f+" "+(LANG==="zh"?c.zh:c.en);
  document.getElementById("cvm").textContent=c.p.length+" "+(LANG==="zh"?"位人物 · ":i("people-count")+" · ")+(LANG==="zh"?c.cont.zh:c.cont.en);
  const secs=["all",...new Set(c.p.map(p=>p.s))];
  document.getElementById("cvf").innerHTML=secs.map(s=>`<span class="sc${s===activeSec?" on":""}" onclick="filterS('${s}','${id}')">${s==="all"?i("sec-all"):sn(s)}</span>`).join("");
  renderCards(c,activeSec);
  document.getElementById("cv").classList.add("open");
  document.getElementById("bc").innerHTML=`<span class="bci" onclick="closeCV()">🌌 ${i("bc-globe")}</span><span class="bcs"> › </span><span class="bci a">${c.f} ${LANG==="zh"?c.zh:c.en}</span>`;
  setMode(currentMode);
}

window.filterS=function(s,id){
  activeSec=s;
  const c=DATA.find(x=>x.id===id);
  document.querySelectorAll(".sc").forEach(el=>el.classList.toggle("on",el.textContent===(s==="all"?i("sec-all"):sn(s))));
  renderCards(c,s);
  if(currentMode==="graph"){
    // Close card if open
    document.getElementById("gcard").classList.remove("open");
    gSelectedId=null;
    // Rebuild graph with filter
    const canvas=document.getElementById("graphCanvas");
    const filteredCountry={...c, p: s==="all"?c.p:c.p.filter(p=>p.s===s)};
    const {nodes,edges}=buildGraphData(filteredCountry);
    gNodes=nodes;gEdges=edges;
    // Auto-fit
    const personN=nodes.filter(n=>n.type==="person");
    if(personN.length>0){
      const xs=personN.map(n=>n.x),ys=personN.map(n=>n.y);
      const minX=Math.min(...xs)-60,maxX=Math.max(...xs)+60;
      const minY=Math.min(...ys)-60,maxY=Math.max(...ys)+60;
      const scaleX=canvas.width/(maxX-minX),scaleY=canvas.height/(maxY-minY);
      const sc=Math.min(scaleX,scaleY,1.2)*0.82;
      gTransform={scale:sc,x:(canvas.width-(minX+maxX)*sc)/2,y:(canvas.height-(minY+maxY)*sc)/2};
    }
    drawGraph();
  }
};

function ll2(la,lo){const la2=la*Math.PI/180,lo2=lo*Math.PI/180;return[Math.cos(la2)*Math.cos(lo2),Math.sin(la2),Math.cos(la2)*Math.sin(lo2)];}
function rp(x,y,z){const cy=Math.cos(rY),sy=Math.sin(rY),cx2=Math.cos(rX),sx=Math.sin(rX);const x1=x*cy+z*sy,z1=-x*sy+z*cy;const y2=y*cx2-z1*sx,z2=y*sx+z1*cx2;return{px:GCX+x1*GR*zoom,py:GCY-y2*GR*zoom,z:z2};}

function drawGlobe(){
  gX.clearRect(0,0,GW,GH);
  const R=GR*zoom;
  gX.beginPath();gX.arc(GCX,GCY,R,0,Math.PI*2);
  const bg=gX.createRadialGradient(GCX-R*.2,GCY-R*.2,0,GCX,GCY,R);
  bg.addColorStop(0,"rgba(8,28,72,.35)");bg.addColorStop(.65,"rgba(3,10,35,.22)");bg.addColorStop(1,"rgba(0,3,15,.45)");
  gX.fillStyle=bg;gX.fill();
  gX.save();gX.beginPath();gX.arc(GCX,GCY,R,0,Math.PI*2);gX.clip();
  gX.lineWidth=0.3;
  for(let la=-75;la<=75;la+=15){gX.beginPath();let f=true;for(let lo=0;lo<=362;lo+=2){const p=rp(...ll2(la,lo));if(p.z<-.06){f=true;continue;}f?(gX.moveTo(p.px,p.py),f=false):gX.lineTo(p.px,p.py);}gX.strokeStyle=la===0?"rgba(255,255,255,.16)":"rgba(255,255,255,.05)";gX.stroke();}
  for(let lo=0;lo<360;lo+=20){gX.beginPath();let f=true;for(let la=-90;la<=90;la+=2){const p=rp(...ll2(la,lo));if(p.z<-.06){f=true;continue;}f?(gX.moveTo(p.px,p.py),f=false):gX.lineTo(p.px,p.py);}gX.strokeStyle="rgba(255,255,255,.03)";gX.stroke();}
  POLYS.forEach(poly=>{
    const isKey=DATA.some(c=>c.id===poly.id);const isHov=hovC===poly.id;
    gX.beginPath();let f=true;
    poly.pts.forEach(([la,lo])=>{const p=rp(...ll2(la,lo));if(p.z<-.09){f=true;return;}f?(gX.moveTo(p.px,p.py),f=false):gX.lineTo(p.px,p.py);});
    gX.closePath();
    if(isHov){gX.fillStyle="rgba(125,211,252,.22)";gX.strokeStyle="rgba(125,211,252,.8)";gX.lineWidth=1.5;}
    else if(isKey){gX.fillStyle="rgba(125,211,252,.08)";gX.strokeStyle="rgba(125,211,252,.35)";gX.lineWidth=0.8;}
    else{gX.fillStyle="rgba(255,255,255,.02)";gX.strokeStyle="rgba(255,255,255,.1)";gX.lineWidth=0.35;}
    gX.fill();gX.stroke();
  });
  gX.restore();
  const atm=gX.createRadialGradient(GCX,GCY,R*.9,GCX,GCY,R*1.08);
  atm.addColorStop(0,"transparent");atm.addColorStop(.5,"rgba(125,211,252,.04)");atm.addColorStop(1,"transparent");
  gX.beginPath();gX.arc(GCX,GCY,R*1.07,0,Math.PI*2);gX.fillStyle=atm;gX.fill();
  gX.beginPath();gX.arc(GCX,GCY,R,0,Math.PI*2);gX.strokeStyle="rgba(125,211,252,.18)";gX.lineWidth=1.2;gX.stroke();
  // Country labels + person avatar clusters
  DATA.forEach(c=>{
    const p=rp(...ll2(c.la,c.lo));if(p.z<.06)return;
    const hov=hovC===c.id,fs=Math.max(11,Math.min(16,12*zoom));
    const alpha=Math.min(1,(p.z-.06)*4);
    gX.font=hov?`700 ${fs}px Inter,sans-serif`:`500 ${fs-1}px Inter,sans-serif`;
    gX.strokeStyle=hov?"rgba(5,7,14,.9)":"rgba(5,7,14,.6)";gX.lineWidth=3.5;
    gX.fillStyle=hov?"rgba(125,211,252,1)":`rgba(240,244,255,${alpha*.8})`;
    gX.textAlign="center";gX.textBaseline="middle";
    const lbl=c.f+" "+(LANG==="zh"?c.zh:c.en);
    gX.strokeText(lbl,p.px,p.py);gX.fillText(lbl,p.px,p.py);

    // Person avatar dot clusters below label
    const maxDots=Math.min(c.p.length,8);
    const dR=Math.max(4,Math.min(8.5,6.5*zoom));
    const dGap=dR*2.4;
    const labelH=fs*0.7+4;
    const dY=p.py+labelH+dR;
    const dX0=p.px-(maxDots-1)*dGap/2;
    for(let i=0;i<maxDots;i++){
      const pn=c.p[i];
      const dc=SEC[pn.s]||"#7dd3fc";
      const dx=dX0+i*dGap;
      // Glow ring for hover
      if(hov){gX.beginPath();gX.arc(dx,dY,dR+2.5,0,Math.PI*2);gX.fillStyle=dc+"33";gX.fill();}
      // Avatar circle
      gX.beginPath();gX.arc(dx,dY,dR,0,Math.PI*2);
      gX.fillStyle=strColor(pn.e)+(hov?"ee":"bb");
      gX.fill();
      gX.strokeStyle=dc;gX.lineWidth=hov?1.8:1.2;gX.globalAlpha=hov?1:alpha*0.85;
      gX.stroke();gX.globalAlpha=1;
      // Initials (show when zoomed in or hovering)
      if(zoom>1.3||hov){
        const ini=(pn.e.split(" ")[0][0]||"")+(pn.e.split(" ")[1]?.[0]||"");
        gX.font=`bold ${Math.max(4,Math.floor(dR*0.85))}px Syne,sans-serif`;
        gX.fillStyle="#fff";gX.textAlign="center";gX.textBaseline="middle";
        gX.fillText(ini,dx,dY);
      }
    }
    // "+N more" indicator
    if(c.p.length>8){
      const moreX=dX0+maxDots*dGap;
      gX.font=`600 ${Math.max(7,Math.floor(dR*0.9))}px Inter,sans-serif`;
      gX.fillStyle=`rgba(240,244,255,${alpha*0.65})`;
      gX.textAlign="left";gX.textBaseline="middle";
      gX.fillText(`+${c.p.length-8}`,moreX-dR*0.5,dY);
    }
  });
}

function hitCountry(mx,my){
  let best=null,bd=32;
  DATA.forEach(c=>{const p=rp(...ll2(c.la,c.lo));if(p.z<.0)return;const d=Math.hypot(p.px-mx,p.py-my);if(d<bd){bd=d;best=c.id;}});
  return best;
}

function makeTone(freq,startT,dur,peakVol,type="sine",detune=0){
  if(!AC||!mg)return;
  if(!isFinite(freq)||!isFinite(startT)||!isFinite(dur)||dur<=0||!isFinite(peakVol))return;
  const o=AC.createOscillator();
  const g=AC.createGain();
  const flt=AC.createBiquadFilter();
  flt.type="lowpass";flt.frequency.value=3800;flt.Q.value=0.3;
  o.type=type;
  o.frequency.value=freq;
  o.detune.value=isFinite(detune)?detune:0;
  // Pluck-like: fast attack, slow decay (harp/piano feel)
  const atk=0.008;
  g.gain.setValueAtTime(0,startT);
  g.gain.linearRampToValueAtTime(peakVol,startT+atk);
  g.gain.exponentialRampToValueAtTime(peakVol*0.35,startT+dur*0.3);
  g.gain.exponentialRampToValueAtTime(0.0001,startT+dur);
  o.connect(flt);flt.connect(g);g.connect(mg);
  o.start(startT);o.stop(startT+dur+0.05);
  snd.push(o);
}

function makePad(freq,startT,dur,peakVol,detune=0,type="sine"){
  if(!AC||!mg)return;
  if(!isFinite(freq)||!isFinite(startT)||!isFinite(dur)||dur<=0||!isFinite(peakVol))return;
  const o=AC.createOscillator();
  const g=AC.createGain();
  const flt=AC.createBiquadFilter();
  flt.type="lowpass";flt.frequency.value=1400;flt.Q.value=0.4;
  o.type=type;o.frequency.value=freq;o.detune.value=isFinite(detune)?detune:0;
  const atk=Math.min(dur*0.25,4),rel=Math.min(dur*0.3,5);
  g.gain.setValueAtTime(0,startT);
  g.gain.linearRampToValueAtTime(peakVol,startT+atk);
  g.gain.setValueAtTime(peakVol,startT+dur-rel);
  g.gain.linearRampToValueAtTime(0,startT+dur);
  o.connect(flt);flt.connect(g);g.connect(mg);
  o.start(startT);o.stop(startT+dur);
  snd.push(o);
}

function addLFO(targetParam,rate,depth,startT,dur){
  if(!AC)return;
  if(!isFinite(rate)||!isFinite(depth)||!isFinite(startT)||!isFinite(dur)||dur<=0)return;
  const lfo=AC.createOscillator();
  const lfoG=AC.createGain();
  lfo.type="sine";lfo.frequency.value=rate;
  lfoG.gain.value=depth;
  lfo.connect(lfoG);lfoG.connect(targetParam);
  lfo.start(startT);lfo.stop(startT+dur);
  lfoOscs.push(lfo);
}

// C major pentatonic scale: C4 D4 E4 G4 A4 C5 D5 E5 G5
const SCALE=[261.63,293.66,329.63,392,440,523.25,587.33,659.25,784];

function scheduleArpeggio(t,rootFreqs,noteDur,gap,vol){
  // Harp-like ascending arpeggio
  rootFreqs.forEach((f,i)=>{
    makeTone(f,t+i*gap,noteDur,vol);
    // Add harmonic overtone for brightness
    makeTone(f*2,t+i*gap+0.003,noteDur*0.6,vol*0.18,"sine",5);
  });
}

function scheduleGalaxy(t){
  if(!AC||!mg)return;

  // ── ONLY bright plucked harp arpeggios — no drones, no pads, no bass rumble
  // C major pentatonic: C D E G A
  // Wave 1: gentle ascending C4→G5
  scheduleArpeggio(t+0.5,  [261.63,329.63,392,523.25,659.25], 1.6, 0.20, 0.065);
  // Wave 2: higher shimmer G4→C6
  scheduleArpeggio(t+4.5,  [392,523.25,659.25,784,1046.5],    1.3, 0.25, 0.040);
  // Wave 3: dreamy descend E5→C4
  scheduleArpeggio(t+10,   [659.25,523.25,440,392,329.63,261.63], 1.5, 0.28, 0.034);
  // Wave 4: mid twinkle
  scheduleArpeggio(t+16.5, [440,523.25,587.33,659.25,784],    1.4, 0.22, 0.038);
  // Wave 5: gentle return
  scheduleArpeggio(t+23,   [392,329.63,261.63,196,261.63,329.63], 1.7, 0.28, 0.030);
  // Wave 6: high floating
  scheduleArpeggio(t+30,   [784,880,1046.5,880,784,659.25],   1.1, 0.20, 0.022);
  // Wave 7: mid resolve
  scheduleArpeggio(t+37,   [523.25,659.25,784,659.25,523.25,440], 1.3, 0.24, 0.028);
  // Wave 8: final home
  scheduleArpeggio(t+44,   [261.63,329.63,392,523.25,392,329.63,261.63], 1.5, 0.28, 0.036);

  // ── A few soft bell sparkles — very quiet
  [[1046.5,7,0.010],[1318.5,13,0.007],[880,20,0.009],[1046.5,28,0.007],[1568,35,0.005]].forEach(([f,dt,v])=>{
    makeTone(f,t+dt,1.8,v,"sine");
  });
}

function startA(){
  try{
    if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();
    if(AC.state==="suspended")AC.resume();
    mg=AC.createGain();

    // ── Bright reverb: short shimmer delays
    const d1=AC.createDelay(2);d1.delayTime.value=0.18;
    const d2=AC.createDelay(2);d2.delayTime.value=0.36;
    const fb1=AC.createGain();fb1.gain.value=0.12;
    const fb2=AC.createGain();fb2.gain.value=0.08;
    const wet=AC.createGain();wet.gain.value=0.30;
    const fbFlt=AC.createBiquadFilter();fbFlt.type="lowpass";fbFlt.frequency.value=3500;

    mg.connect(d1);
    d1.connect(fbFlt);fbFlt.connect(fb1);fb1.connect(d2);
    d2.connect(fb2);fb2.connect(d1);
    d1.connect(wet);d2.connect(wet);wet.connect(AC.destination);
    mg.connect(AC.destination);

    // Gentle fade-in
    mg.gain.setValueAtTime(0,AC.currentTime);
    mg.gain.linearRampToValueAtTime(0.52,AC.currentTime+4);

    scheduleGalaxy(AC.currentTime);

    aTimer=setInterval(()=>{
      if(!aOn)return;
      scheduleGalaxy(AC.currentTime+2);
    },55000);
  }catch(e){console.error(e);}
}

let aTimer=null;
function stopA(){
  if(aTimer)clearInterval(aTimer);aTimer=null;
  snd.forEach(o=>{try{o.stop();}catch(e){}});snd=[];
  lfoOscs.forEach(o=>{try{o.stop();}catch(e){}});lfoOscs=[];
  if(mg){mg.gain.linearRampToValueAtTime(0,AC.currentTime+2);setTimeout(()=>{mg=null;},2500);}
}

window.toggleAudio=function(){
  aOn=!aOn;const b=document.getElementById("aBtn");
  if(aOn){startA();b.classList.add("on");document.getElementById("music-label").textContent=LANG==="zh"?"停止":"Stop";}
  else{stopA();b.classList.remove("on");document.getElementById("music-label").textContent=LANG==="zh"?"音乐":"Music";}
};
